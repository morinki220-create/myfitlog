<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>MY FIT LOG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { height: 100%; overscroll-behavior-y: none; }
  body { font-family: 'Noto Sans JP', sans-serif; background: linear-gradient(145deg,#d4f4e4 0%,#c0ecd8 30%,#b0e4cc 60%,#ccf0e0 100%); min-height: 100vh; }
  input, textarea, select { font-size: 16px !important; font-family: 'Noto Sans JP', sans-serif; -webkit-appearance: none; }
  select { background-image: none; }
  button { cursor: pointer; font-family: 'Nunito', sans-serif; }
  ::-webkit-scrollbar { display: none; }

@keyframes floatS { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-14px) scale(1.03)} }
@keyframes popIn  { 0%{transform:scale(0.75);opacity:0} 70%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
@keyframes shake  { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
@keyframes fadeUp { 0%{transform:translateY(20px);opacity:0} 100%{transform:translateY(0);opacity:1} }
@keyframes toastIn{ 0%{transform:translateX(-50%) translateY(20px);opacity:0} 100%{transform:translateX(-50%) translateY(0);opacity:1} }

/* ── 背景バブル ── */
.bg-deco { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
.bubble  { position: absolute; border-radius: 50%; filter: blur(3px); animation: floatS 5s ease-in-out infinite; }

/* ── ヘッダー ── */
#header {
padding: 12px 16px 10px;
padding-top: max(12px, env(safe-area-inset-top));
position: sticky; top: 0; z-index: 100;
background: rgba(190,236,212,0.88);
backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
border-bottom: 1.5px solid rgba(110,195,150,0.5);
}
.header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.app-title  { font-family: ‘Nunito’, sans-serif; font-weight: 900; font-size: 20px; color: #1a6a3a; letter-spacing: -0.5px; }
.user-greeting { font-size: 12px; color: #3a8a5a; margin-top: 2px; }
.tab-bar { display: flex; gap: 6px; }
.tab-btn {
flex: 1; padding: 8px 4px; border-radius: 12px; border: none;
font-size: 11px; font-weight: 500; transition: all 0.2s;
background: rgba(255,255,255,0.65); color: #3a8a5a; min-height: 48px;
display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
touch-action: manipulation;
}
.tab-btn.active { background: linear-gradient(135deg,#4ac890,#1a7a4a); color: #fff; font-weight: 900; box-shadow: 0 3px 12px rgba(30,140,80,0.32); }
.tab-icon { font-size: 16px; }

/* ── 汎用ボタン ── */
.btn-green  { background: linear-gradient(135deg,#4ac890,#1a7a4a); color:#fff; border:none; border-radius:14px; padding:14px; font-size:16px; font-weight:900; width:100%; min-height:52px; touch-action:manipulation; }
.btn-outline{ background:rgba(255,255,255,0.9); color:#1a7a4a; border:2px solid #7acca0; border-radius:14px; padding:14px; font-size:16px; font-weight:900; width:100%; min-height:52px; touch-action:manipulation; }
.btn-plus   { width:44px; height:44px; border-radius:14px; background:linear-gradient(135deg,#4ac890,#1a7a4a); border:none; color:#fff; font-size:26px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(30,140,80,0.40); touch-action:manipulation; }
.btn-logout { padding:8px 14px; border-radius:12px; min-height:44px; background:rgba(255,255,255,0.75); border:1.5px solid #7acca0; color:#1a6a3a; font-size:13px; font-weight:600; touch-action:manipulation; font-family:‘Noto Sans JP’,sans-serif; }

/* ── コンテンツ ── */
.tab-content { padding: 16px 16px 100px; position: relative; z-index: 1; display: none; }
.tab-content.active { display: block; }

/* ── カード ── */
.card {
background: rgba(255,255,255,0.88); border-radius: 20px;
border: 2px solid rgba(150,215,185,0.7); padding: 16px;
box-shadow: 0 3px 18px rgba(30,150,80,0.10);
backdrop-filter: blur(8px); margin-bottom: 10px;
touch-action: manipulation;
}
.card.expanded { border-color: #4ac890; }
.card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.card-icon { width:48px; height:48px; border-radius:14px; background:linear-gradient(135deg,#c0f0d8,#a0e8c0); display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0; }
.card-title { font-size:16px; font-weight:800; color:#1a4a3a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-sub   { font-size:12px; color:#5a9a7a; margin-top:2px; }
.badge      { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:800; white-space:nowrap; }
.set-badge  { padding:5px 11px; border-radius:9px; background:#e8f8f0; border:1px solid #a0d8b8; font-size:12px; color:#1a7a4a; }
.sets-row   { display:flex; flex-wrap:wrap; gap:5px; }
.notes-box  { font-size:13px; color:#3a7a5a; padding:10px 14px; background:#f0faf5; border-radius:12px; border-left:4px solid #4ac890; line-height:1.6; margin-bottom:12px; }
.divider    { border-top:1.5px dashed #a0d8b8; margin:14px 0; }

/* ── メディアプレビュー ── */
.media-drop {
width:100%; min-height:110px; border-radius:14px; cursor:pointer;
background:linear-gradient(135deg,#e8f8f0,#d8f4e8);
border:2px dashed #7acca0;
display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
touch-action:manipulation; position:relative; overflow:hidden;
}
.media-drop img, .media-drop video {
width:100%; max-height:240px; border-radius:12px; object-fit:cover; display:block;
}
.media-overlay {
position:absolute; inset:0; background:rgba(0,0,0,0.35); border-radius:12px;
display:flex; align-items:center; justify-content:center;
font-size:13px; color:#fff; font-family:‘Noto Sans JP’,sans-serif;
opacity:0; transition:opacity 0.2s;
}
.media-drop:hover .media-overlay { opacity:1; }
.media-label { font-size:13px; color:#3a9a6a; font-family:‘Noto Sans JP’,sans-serif; }

/* ── フィルタースクロール ── */
.filter-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; margin-bottom:10px; }
.filter-scroll-inner { display:flex; gap:8px; padding-bottom:4px; width:max-content; }
.filter-btn {
padding:9px 16px; border-radius:22px; min-height:44px; font-size:13px;
background:rgba(255,255,255,0.78); color:#3a8a5a;
border:1.5px solid rgba(130,205,165,0.8); font-weight:400;
white-space:nowrap; touch-action:manipulation; font-family:‘Noto Sans JP’,sans-serif;
transition:all 0.15s;
}
.filter-btn.active { background:linear-gradient(135deg,#4ac890,#1a7a4a); color:#fff; border:none; box-shadow:0 2px 10px rgba(30,150,80,0.28); font-weight:700; }
.type-filters { display:flex; gap:8px; margin-bottom:16px; }
.type-btn { flex:1; padding:10px 4px; border-radius:12px; min-height:44px; font-size:12px; background:rgba(255,255,255,0.78); color:#3a8a5a; border:1.5px solid rgba(130,205,165,0.8); font-weight:400; touch-action:manipulation; font-family:‘Noto Sans JP’,sans-serif; transition:all 0.15s; }
.type-btn.active { background:linear-gradient(135deg,#4ac890,#1a7a4a); color:#fff; border:none; font-weight:700; }

/* ── 日付グループ ── */
.date-group { margin-bottom:22px; }
.date-label { font-size:12px; font-weight:800; color:#1a7a4a; display:flex; align-items:center; gap:8px; margin-bottom:10px; font-family:‘Nunito’,sans-serif; }
.date-line  { flex:1; height:2px; background:linear-gradient(90deg,#7acca0,transparent); border-radius:2px; }

/* ── モーダル ── */
.modal-overlay { position:fixed; inset:0; background:rgba(20,100,50,0.25); display:flex; align-items:flex-end; z-index:1000; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
.modal-box {
width:100%; max-width:480px; margin:0 auto;
background:linear-gradient(180deg,#f0faf5,#e8f8f0);
border-radius:24px 24px 0 0; padding:20px;
padding-bottom:max(40px,env(safe-area-inset-bottom));
border:2px solid #a0d8b8; max-height:90vh; overflow-y:auto;
-webkit-overflow-scrolling:touch;
box-shadow:0 -8px 40px rgba(30,140,80,0.24);
animation: fadeUp 0.3s ease;
}
.modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.modal-title{ font-size:17px; font-weight:900; color:#1a7a4a; }
.modal-close{ background:#c0f0d8; border:none; border-radius:50%; width:36px; height:36px; font-size:16px; color:#1a6a3a; display:flex; align-items:center; justify-content:center; touch-action:manipulation; }
.form-input { width:100%; padding:14px 16px; border-radius:14px; border:2px solid #a0d8b8; background:#f0faf5; color:#1a4a3a; margin-bottom:12px; outline:none; }
.form-input:focus { border-color:#1a7a4a; }
.form-row   { display:flex; gap:10px; margin-bottom:12px; }
.form-select{ flex:1; padding:13px 14px; border-radius:14px; border:2px solid #a0d8b8; background:#f0faf5; color:#1a4a3a; }
.form-row-set{ display:flex; gap:8px; margin-bottom:8px; align-items:center; }
.set-label  { font-size:12px; color:#1a7a4a; min-width:50px; font-weight:800; }
.set-input  { flex:1; padding:12px; border-radius:12px; border:1.5px solid #a0d8b8; background:#f0faf5; color:#1a4a3a; }
.btn-add-set{ width:100%; padding:11px; border-radius:12px; background:#e8f8f0; border:1.5px dashed #a0d8b8; color:#1a7a4a; font-size:14px; min-height:44px; touch-action:manipulation; font-family:‘Noto Sans JP’,sans-serif; }
.form-textarea{ width:100%; padding:13px 16px; border-radius:14px; border:2px solid #a0d8b8; background:#f0faf5; color:#1a4a3a; min-height:80px; resize:vertical; margin-bottom:16px; outline:none; }

/* ── emoji picker ── */
.emoji-grid { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.emoji-btn  { width:44px; height:44px; border-radius:12px; font-size:22px; background:#e8f8f0; border:1.5px solid #a0d8b8; touch-action:manipulation; display:flex; align-items:center; justify-content:center; }
.emoji-btn.sel{ background:#c0f0d8; border:2px solid #1a7a4a; }

/* ── トレーナーコーナー ── */
.trainer-corner { border-radius:20px; margin-bottom:16px; overflow:hidden; box-shadow:0 4px 20px rgba(30,150,80,0.14); }
.trainer-header { padding:16px; display:flex; align-items:center; gap:12px; cursor:pointer; touch-action:manipulation; }
.trainer-title  { font-size:16px; font-weight:900; color:#fff; font-family:‘Nunito’,sans-serif; }
.trainer-sub    { font-size:12px; color:rgba(255,255,255,0.8); margin-top:2px; }
.msg-list { display:flex; flex-direction:column; gap:10px; max-height:260px; overflow-y:auto; -webkit-overflow-scrolling:touch; margin-bottom:14px; }
.msg-bubble { padding:11px 14px; border-radius:14px; max-width:85%; }
.msg-from   { font-size:11px; font-weight:800; margin-bottom:4px; font-family:‘Nunito’,sans-serif; }
.msg-text   { font-size:14px; color:#2a4a3a; line-height:1.5; }
.msg-input-row{ display:flex; gap:8px; }
.msg-input  { flex:1; padding:13px 15px; border-radius:14px; border:2px solid #a0d8b8; background:#f0faf5; color:#1a4a3a; outline:none; }
.msg-send   { padding:13px 18px; border-radius:14px; border:none; background:linear-gradient(135deg,#4ac890,#1a7a4a); color:#fff; font-weight:900; font-size:15px; touch-action:manipulation; }

/* ── iCloud同期パネル ── */
.sync-panel { margin-bottom:16px; }
.sync-info  { background:linear-gradient(135deg,#e8f8f0,#d8f4e8); border-radius:14px; padding:12px 14px; margin-bottom:12px; font-size:12px; color:#2a6a4a; line-height:1.8; border:1.5px solid #a0d8b8; }
.sync-info-title { font-weight:800; font-size:13px; margin-bottom:6px; font-family:‘Nunito’,sans-serif; }

/* ── InBody ── */
.inbody-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.inbody-cell{ background:rgba(255,255,255,0.86); border-radius:14px; padding:12px 8px; text-align:center; }
.inbody-label{ font-size:10px; color:#5a9a7a; margin-bottom:3px; }
.inbody-val { font-size:20px; font-weight:900; color:#1a5a3a; font-family:‘Nunito’,sans-serif; }
.inbody-diff{ font-size:11px; font-weight:700; margin-top:2px; font-family:‘Nunito’,sans-serif; }
.history-table{ background:rgba(255,255,255,0.88); border-radius:16px; border:2px solid rgba(150,215,185,0.7); overflow:hidden; }
.history-head{ display:grid; grid-template-columns:1.2fr 1fr 1fr 1fr; padding:10px 12px; background:linear-gradient(135deg,#d8f0e4,#c0e8d0); font-size:11px; font-weight:800; color:#1a6a4a; font-family:‘Nunito’,sans-serif; }
.history-row { display:grid; grid-template-columns:1.2fr 1fr 1fr 1fr; padding:11px 12px; font-size:13px; color:#1a4a3a; border-top:1px solid rgba(150,205,175,0.3); }
.history-row:nth-child(odd){ background:rgba(235,248,240,0.5); }
.history-cell{ text-align:center; }

/* ── トースト ── */
.toast {
position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
color:#fff; padding:12px 20px; border-radius:16px; z-index:2000;
font-size:13px; box-shadow:0 4px 20px rgba(0,0,0,0.25);
max-width:320px; text-align:center; animation:toastIn 0.3s ease;
font-family:‘Noto Sans JP’,sans-serif; white-space:nowrap;
}

/* ── ログイン ── */
#login-screen {
min-height:100vh; display:flex; align-items:center; justify-content:center;
padding:24px 20px;
padding-top:env(safe-area-inset-top,24px);
padding-bottom:env(safe-area-inset-bottom,24px);
}
.login-card { background:rgba(255,255,255,0.93); border-radius:28px; padding:36px 24px; width:100%; max-width:380px; box-shadow:0 10px 48px rgba(30,150,90,0.20); border:2px solid rgba(140,220,180,0.6); animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); position:relative; z-index:10; }
.user-btns  { display:flex; gap:12px; margin-bottom:20px; }
.user-btn   { flex:1; padding:20px 10px; border-radius:18px; border:2px solid rgba(120,200,160,0.5); background:rgba(210,245,228,0.7); color:#1a7a4a; font-size:17px; font-weight:900; touch-action:manipulation; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:6px; }
.user-btn.sel{ background:linear-gradient(135deg,#4ac890,#1a7a4a); color:#fff; border-color:#1a7a4a; box-shadow:0 4px 20px rgba(30,140,80,0.38); transform:scale(1.04); }
.user-btn-icon{ font-size:36px; }
.user-btn-role{ font-size:11px; opacity:0.8; }
.pw-input   { width:100%; padding:15px 16px; border-radius:14px; border:2px solid #a0d8b8; font-size:16px; background:#f0faf5; color:#1a4a3a; outline:none; margin-bottom:16px; }
.pw-input:focus{ border-color:#1a7a4a; }

/* ── ニュースカード ── */
.news-card { background:rgba(255,255,255,0.90); border-radius:18px; border:2px solid rgba(150,215,185,0.7); padding:16px; margin-bottom:12px; cursor:pointer; box-shadow:0 3px 14px rgba(30,150,80,0.09); touch-action:manipulation; }
.news-card.expanded { border-color:#4ac890; }
.news-head  { display:flex; align-items:flex-start; gap:12px; margin-bottom:10px; }
.news-flag  { width:46px; height:46px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.news-source{ font-size:11px; font-weight:800; font-family:‘Nunito’,sans-serif; }
.news-date  { font-size:11px; color:#7aaa8a; }
.news-cat   { padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; font-family:‘Nunito’,sans-serif; }
.news-title { font-size:14px; font-weight:800; color:#1a4a3a; font-family:‘Nunito’,sans-serif; line-height:1.5; }
.news-body  { font-size:13px; color:#3a6a4a; line-height:1.8; background:#f0faf5; border-radius:12px; padding:12px 14px; margin-bottom:8px; }
.news-more  { font-size:12px; color:#8ab8a0; text-align:right; }
</style>

</head>
<body>

<!-- 背景バブル -->

<div class="bg-deco" id="bgDeco"></div>

<!-- ログイン画面 -->

<div id="login-screen">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:56px;margin-bottom:8px">🏋️</div>
      <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:26px;color:#1a7a4a">MY FIT LOG</div>
      <div style="font-size:14px;color:#5a9a7a;margin-top:4px">プライベートトレーニング記録</div>
    </div>
    <div style="font-size:13px;font-weight:800;color:#1a7a4a;text-align:center;margin-bottom:12px">アカウントを選択</div>
    <div class="user-btns">
      <button class="user-btn" onclick="selectUser('Ayumi')" id="btn-Ayumi">
        <span class="user-btn-icon">🌿</span>
        <span>Ayumi</span>
        <span class="user-btn-role">メンバー</span>
      </button>
      <button class="user-btn" onclick="selectUser('Trainer')" id="btn-Trainer">
        <span class="user-btn-icon">🏋️</span>
        <span>Tatsuro</span>
        <span class="user-btn-role">トレーナー</span>
      </button>
    </div>
    <div id="pw-area" style="display:none">
      <div style="font-size:13px;font-weight:800;color:#1a7a4a;margin-bottom:8px">パスワード</div>
      <input class="pw-input" type="password" id="pw-input" placeholder="パスワードを入力" oninput="clearErr()" onkeydown="if(event.key==='Enter')tryLogin()">
      <div id="login-err" style="font-size:13px;color:#cc3333;text-align:center;margin-bottom:12px;display:none">⚠️ パスワードが正しくありません</div>
      <button class="btn-green" onclick="tryLogin()" id="login-btn" style="opacity:0.5;pointer-events:none">ログイン 💪</button>
    </div>
    <div style="text-align:center;margin-top:16px;font-size:12px;color:#7ab898">🔒 AyumiさんとTatsuro専用アプリです</div>
  </div>
</div>

<!-- メインアプリ（ログイン後に表示） -->

<div id="main-app" style="display:none;max-width:480px;margin:0 auto;min-height:100vh">

  <!-- ヘッダー -->

  <div id="header">
    <div class="header-row">
      <div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:22px">🏋️</span>
          <span class="app-title">MY FIT LOG</span>
        </div>
        <div class="user-greeting" id="greeting"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn-plus" id="add-btn" onclick="openAddModal()">＋</button>
        <button class="btn-logout" onclick="logout()">ログアウト</button>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab(0)" id="tab0"><span class="tab-icon">💪</span>トレーニング</button>
      <button class="tab-btn"        onclick="switchTab(1)" id="tab1"><span class="tab-icon">🌱</span>健康・栄養</button>
      <button class="tab-btn"        onclick="switchTab(2)" id="tab2"><span class="tab-icon">📊</span>データ</button>
      <button class="tab-btn"        onclick="switchTab(3)" id="tab3"><span class="tab-icon">📰</span>ニュース</button>
    </div>
  </div>

  <!-- ① トレーニングタブ -->

  <div class="tab-content active" id="content0">
    <!-- iCloud同期 -->
    <div class="sync-panel">
      <button class="btn-green" onclick="toggleSync()" id="sync-toggle-btn" style="background:linear-gradient(135deg,#2a8a6a,#1a6a4a);display:flex;align-items:center;justify-content:center;gap:8px">
        <span style="font-size:18px">☁️</span> iCloudへ保存 / 読み込む
      </button>
      <div id="sync-panel-body" style="display:none;background:rgba(255,255,255,0.95);border-radius:0 0 20px 20px;border:2px solid #a0d8b8;border-top:none;padding:16px">
        <div class="sync-info">
          <div class="sync-info-title">📱 iPhoneでの使い方</div>
          <div>① 「保存する」→ JSONファイルをダウンロード</div>

let selectedUserId = null;
function selectUser(id) {
  selectedUserId = id;
  document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('btn-'+id).classList.add('sel');
  document.getElementById('pw-area').style.display = 'block';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-input').focus();
  clearErr();
  updateLoginBtn();
}
function clearErr() {
  document.getElementById('login-err').style.display = 'none';
  updateLoginBtn();
}
function updateLoginBtn() {
  const pw = document.getElementById('pw-input')?.value || '';
  const btn = document.getElementById('login-btn');
  if (pw.length > 0 && selectedUserId) {
    btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
  } else {
    btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none';
  }
}
document.getElementById('pw-input')?.addEventListener('input', updateLoginBtn);

function tryLogin() {
  const u = USERS[selectedUserId];
  const pw = document.getElementById('pw-input').value;
  if (u && u.password === pw) {
    currentUser = {id: selectedUserId, ...u};
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('login-err').style.display = 'block';
    const card = document.querySelector('.login-card');
    card.style.animation = 'none';
    setTimeout(() => { card.style.animation = 'shake 0.4s ease'; }, 10);
  }
}
function logout() {
  currentUser = null; selectedUserId = null;
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('sel'));

function renderTrainingList() {
  const filtered = TRAINING
    .filter(r => (filterPart==='すべて'||r.bodyPart===filterPart) && (filterType==='すべて'||r.type===filterType))
    .sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('record-count').textContent = filtered.length + ' RECORDS 💪';
  if (!filtered.length) {
    document.getElementById('training-list').innerHTML = '<div style="text-align:center;padding:60px 0;color:#4aaa7a"><div style="font-size:48px;margin-bottom:14px">🏋️</div><div style="font-family:Nunito,sans-serif;font-weight:800;font-size:16px">記録が見つかりません</div></div>';
    return;
  }
  // 日付グループ
  const grouped = {};
  filtered.forEach(r => { if (!grouped[r.date]) grouped[r.date]=[]; grouped[r.date].push(r); });
  document.getElementById('training-list').innerHTML = Object.entries(grouped).map(([date,recs]) => `
    <div class="date-group">
      <div class="date-label">
        <span>🗓 ${date.replace(/-/g,'.')}</span>
        <div class="date-line"></div>
        <span>${recs.length}種目</span>
      </div>
      ${recs.map(r => renderCard(r)).join('')}
    </div>
  `).join('');
}

function renderCard(r) {
  const tc = TYPE_COL[r.type] || {};
  const open = expandedCards[r.id];
  const media = mediaStore[r.id];
  let mediaHTML = '';
  if (open) {
    if (media) {
      const isVideo = media.type === 'video';
      mediaHTML = `
        <div style="position:relative;border-radius:12px;overflow:hidden;margin-bottom:0">
          ${isVideo
            ? `<video src="${media.url}" controls playsinline style="width:100%;max-height:240px;border-radius:12px;object-fit:cover;display:block"></video>`
            : `<img src="${media.url}" style="width:100%;max-height:240px;border-radius:12px;object-fit:cover;display:block">`
          }
          <div style="margin-top:8px;display:flex;gap:8px">
            <label style="flex:1;padding:10px;border-radius:12px;background:linear-gradient(135deg,#e8f8f0,#d8f4e8);border:2px dashed #7acca0;text-align:center;font-size:13px;color:#3a9a6a;cursor:pointer;font-family:'Noto Sans JP',sans-serif">
              📸 変更する
              <input type="file" accept="image/*,video/*" style="display:none" onchange="handleMediaUpload(event,${r.id})">
            </label>
          </div>
        </div>`;
    } else {
      mediaHTML = `
        <label class="media-drop" style="cursor:pointer">
          <span style="font-size:28px">📸</span>
          <span class="media-label">写真・動画を追加（共有ファイルからも選択可）</span>
          <span style="font-size:11px;color:#7aaa8a;font-family:'Noto Sans JP',sans-serif">タップしてファイルを選択</span>
          <input type="file" accept="image/*,video/*" style="display:none" onchange="handleMediaUpload(event,${r.id})">
        </label>`;
    }
  }
  return `
    <div class="card${open?' expanded':''}" onclick="toggleCard(${r.id})" id="card-${r.id}">
      <div class="card-head">
        <div class="card-icon">${r.emoji}</div>
        <div style="flex:1;min-width:0">
          <div class="card-title">${r.exercise}</div>
          <div class="card-sub">${r.date.replace(/-/g,'/')} · ${r.sets.length}セット${r.addedBy==='Trainer'?' <span style="color:#1a5a8a">🏋️ Tatsuro</span>':''}</div>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0;flex-direction:column;align-items:flex-end">
          <span class="badge" style="background:${tc.bg};color:${tc.text};border:1px solid ${tc.border}">${r.type}</span>
          <span class="badge" style="background:#e8f8f0;color:#1a7a4a;border:1px solid #a0d8b8;font-weight:400;font-family:'Noto Sans JP',sans-serif">${r.bodyPart}</span>
        </div>
      </div>
      <div class="sets-row">${r.sets.map((s,i)=>`<span class="set-badge">Set${i+1} ${s.weight?s.weight+'kg×'+s.reps+'回':s.reps?s.reps+'回':s.duration||''}</span>`).join('')}</div>
      ${open ? `<div class="divider"></div>${r.notes?`<div class="notes-box">📝 ${r.notes}</div>`:''}${mediaHTML}` : ''}
    </div>`;
}

function toggleCard(id) {
  expandedCards[id] = !expandedCards[id];
  renderTrainingList();
}

// ── メディアアップロード（写真・動画プレビュー）──
function handleMediaUpload(event, id) {
  event.stopPropagation();
  const file = event.target.files[0];
  if (!file) return;
  const isVideo = file.type.startsWith('video/');
  const reader = new FileReader();
  reader.onload = e => {
    mediaStore[id] = { url: e.target.result, type: isVideo ? 'video' : 'image' };
    expandedCards[id] = true;
    renderTrainingList();
    showToast('✅ ' + (isVideo ? '動画' : '写真') + 'を追加しました！');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function renderInBody() {
  const l = BODY.length>0?BODY[0]:null, p = BODY.length>1?BODY[1]:null;
  const diff = k => l&&p ? (Number(l[k])-Number(p[k])).toFixed(1) : 0;
  const ac = (k,inv)=>{ const d=diff(k); if(d==0)return'#888'; return((d>0&&!inv)||d<0&&inv)?'#1a8a5a':'#cc4444'; };
  const as = (k,inv)=>{ const d=diff(k); if(d==0)return'→'; return((d>0&&!inv)||(d<0&&inv))?'▲':'▼'; };
  const cells = [
    {l:'体重',k:'weight',u:'kg',inv:true},{l:'体脂肪率',k:'fat',u:'%',inv:true},
    {l:'筋肉量',k:'muscle',u:'kg',inv:false},{l:'BMI',k:'bmi',u:'',inv:true},
    {l:'体水分',k:'water',u:'%',inv:false},{l:'骨量',k:'bone',u:'kg',inv:false},
  ];
  document.getElementById('data-inbody').innerHTML = `
    <div style="background:linear-gradient(135deg,rgba(195,238,215,0.97),rgba(170,225,200,0.97));border-radius:20px;border:2px solid #7acca0;padding:18px 16px;margin-bottom:16px;box-shadow:0 4px 20px rgba(30,150,80,0.14)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <span style="font-size:24px">📊</span>
        <div>
          <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:#1a5a3a">最新 InBody データ</div>
          <div style="font-size:12px;color:#3a8a5a">${l?l.date.replace(/-/g,'/'):'---'} 測定</div>
        </div>
      </div>
      <div class="inbody-grid">${cells.map(m=>`
        <div class="inbody-cell">
          <div class="inbody-label">${m.l}</div>
          <div class="inbody-val">${l?l[m.k]:'-'}${m.u}</div>
          <div class="inbody-diff" style="color:${ac(m.k,m.inv)}">${as(m.k,m.inv)} ${Math.abs(diff(m.k))}${m.u}</div>
        </div>`).join('')}
      </div>
    </div>
    <div style="font-weight:900;font-size:13px;color:#1a7a4a;margin-bottom:10px;font-family:'Nunito',sans-serif">📈 測定履歴</div>
    <div class="history-table" style="margin-bottom:16px">
      <div class="history-head"><div class="history-cell">日付</div><div class="history-cell">体重</div><div class="history-cell">体脂肪%</div><div class="history-cell">筋肉量</div></div>
      ${BODY.map((r,i)=>`<div class="history-row"><div class="history-cell" style="font-size:11px">${r.date.slice(5).replace('-','/')}</div><div class="history-cell" style="font-weight:700">${r.weight}</div><div class="history-cell">${r.fat}%</div><div class="history-cell">${r.muscle}</div></div>`).join('')}
    </div>
    <button class="btn-green" onclick="showInBodyForm()" id="inbody-form-btn">＋ InBody結果を入力（紙から）</button>
    <div id="inbody-form" style="display:none;background:rgba(255,255,255,0.93);border-radius:20px;border:2px solid #a0d8b8;padding:16px;margin-top:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <input id="ib-weight" type="number" placeholder="体重(kg)" class="form-input" style="margin:0">
        <input id="ib-fat"    type="number" placeholder="体脂肪率(%)" class="form-input" style="margin:0">
        <input id="ib-muscle" type="number" placeholder="筋肉量(kg)" class="form-input" style="margin:0">
        <input id="ib-bmi"    type="number" placeholder="BMI" class="form-input" style="margin:0">
        <input id="ib-water"  type="number" placeholder="体水分(%)" class="form-input" style="margin:0">
        <input id="ib-bone"   type="number" placeholder="骨量(kg)" class="form-input" style="margin:0">
      </div>
      <button class="btn-green" onclick="saveInBody()">保存 📊</button>
    </div>`;
}
function showInBodyForm() {
  const f = document.getElementById('inbody-form');
  f.style.display = f.style.display==='none' ? 'block' : 'none';
}
function saveInBody() {
  const w = document.getElementById('ib-weight').value;
  if (!w) { showToast('⚠️ 体重を入力してください', false); return; }
  BODY.unshift({date:new Date().toISOString().slice(0,10),weight:Number(w),fat:Number(document.getElementById('ib-fat').value),muscle:Number(document.getElementById('ib-muscle').value),bmi:Number(document.getElementById('ib-bmi').value),water:Number(document.getElementById('ib-water').value),bone:Number(document.getElementById('ib-bone').value)});
  renderInBody(); showToast('✅ InBodyデータを保存しました！');
}
function renderHamming() {
  const weeks = [
    {week:'4/1週', weight:[58.0,58.3,58.1,58.2,58.4,58.2,58.1]},
    {week:'3/25週',weight:[58.5,58.7,58.6,58.8,58.9,58.8,58.6]},
  ];
  document.getElementById('data-hamming').innerHTML = `
    <div style="background:linear-gradient(135deg,rgba(195,238,215,0.97),rgba(170,225,200,0.97));border-radius:20px;border:2px solid #7acca0;padding:18px 16px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:24px">⚖️</span><div><div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:#1a5a3a">Hamming 体重データ（サンプル）</div><div style="font-size:12px;color:#3a8a5a">週次グラフ</div></div></div>
      ${weeks.map(w=>`
        <div style="margin-bottom:16px">
          <div style="font-size:12px;font-weight:800;color:#1a6a4a;margin-bottom:8px;font-family:'Nunito',sans-serif">${w.week}</div>
          <div style="display:flex;gap:4px;align-items:flex-end;height:70px">
            ${w.weight.map((v,i)=>{const min=Math.min(...w.weight),max=Math.max(...w.weight),h=((v-min)/(max-min+.001))*45+25;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px"><div style="font-size:9px;color:#3a8a5a;font-weight:700">${v}</div><div style="width:100%;height:${h}px;border-radius:5px 5px 0 0;background:linear-gradient(180deg,#4ac890,#1a8a5a)"></div><div style="font-size:10px;color:#7aaa8a">${['月','火','水','木','金','土','日'][i]}</div></div>`;}).join('')}
          </div>
        </div>`).join('')}
    </div>`;
}
function renderLineChat() {
  document.getElementById('data-line').innerHTML = `
    <div style="font-weight:900;font-size:13px;color:#1a7a4a;margin-bottom:12px;font-family:'Nunito',sans-serif">💬 LINEトーク履歴（サンプル）</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${MESSAGES.map(m=>`
        <div style="padding:12px 14px;border-radius:16px;max-width:86%;background:${m.from==='Trainer'?'linear-gradient(135deg,#d8f0f8,#c8e8f4)':'rgba(210,245,228,0.95)'};border:1.5px solid ${m.from==='Trainer'?'#7abccc':'#a0d8b8'};align-self:${m.from==='Trainer'?'flex-start':'flex-end'}">
          <div style="font-size:11px;font-weight:800;margin-bottom:4px;color:${m.from==='Trainer'?'#1a4a6a':'#1a6a4a'};font-family:'Nunito',sans-serif">${m.from==='Trainer'?'🏋️ Tatsuro':'🌿 Ayumi'} · ${m.time}</div>
          <div style="font-size:14px;color:#2a4a3a;line-height:1.5">${m.text}</div>
        </div>`).join('')}
    </div>`;
}

//  ニュース
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderNewsFilters() {
  document.getElementById('news-filters').innerHTML = NEWS_CATS.map(c =>
    `<button class="filter-btn${filterNews===c?' active':''}" onclick="setNewsFilter('${c}')">${c}</button>`
  ).join('');
}
function setNewsFilter(c) { filterNews=c; renderNewsFilters(); renderNewsList(); }
function renderNewsList() {
  const filtered = NEWS.filter(n=>filterNews==='すべて'||n.category===filterNews);
  document.getElementById('news-list').innerHTML = filtered.map(n => `
    <div class="news-card${expandedNews[n.id]?' expanded':''}" onclick="toggleNews(${n.id})">
      <div class="news-head">
        <div class="news-flag" style="background:${n.color}20;border:2px solid ${n.color}50">${n.flag}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap">
            <span class="news-source" style="color:${n.color}">${n.source}</span>
            <span class="news-date">${n.date}</span>
            <span class="news-cat" style="background:${n.color}18;color:${n.color};border:1px solid ${n.color}44">${n.category}</span>
          </div>
          <div class="news-title">${n.title}</div>
        </div>
      </div>
      ${expandedNews[n.id]?`<div class="news-body">${n.summary}<div style="margin-top:8px;font-size:11px;color:#8ab8a0">※ デモ用サンプルです</div></div>`:''}
      <div class="news-more">${expandedNews[n.id]?'▲ 閉じる':'▼ 続きを読む'}</div>
    </div>`).join('');
}
function toggleNews(id) { expandedNews[id]=!expandedNews[id]; renderNewsList(); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  iCloud 保存 / 読み込み
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toggleSync() {
  syncOpen = !syncOpen;
  document.getElementById('sync-panel-body').style.display = syncOpen ? 'block' : 'none';
  document.getElementById('sync-toggle-btn').style.borderRadius = syncOpen ? '20px 20px 0 0' : '14px';
  updateSyncCounts();
}
function updateSyncCounts() {
  const el = document.getElementById('sync-counts');
  if (el) el.textContent = `※ データ件数：トレーニング ${TRAINING.length}件 / 健康 ${HEALTH.length}件 / InBody ${BODY.length}件`;
}
function exportData() {
  const data = {version:'1.0', exportedAt:new Date().toISOString(), appName:'MY FIT LOG', training:TRAINING, health:HEALTH, body:BODY};
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'myfitlog_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('💾 保存しました！ファイルアプリ→iCloudに移動してください');
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.appName !== 'MY FIT LOG') { showToast('⚠️ このファイルはMY FIT LOGのデータではありません', false); return; }
      TRAINING = data.training || [];
      HEALTH   = data.health   || [];
      BODY     = data.body     || [];
      renderAll();
      showToast('✅ 読み込み完了！' + (data.exportedAt||'').slice(0,10) + 'のデータを復元しました');
      toggleSync();
    } catch { showToast('⚠️ ファイルの読み込みに失敗しました', false); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

//  トースト通知
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showToast(msg, ok=true) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = ok ? 'rgba(30,120,70,0.95)' : 'rgba(180,40,40,0.95)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
