    input, textarea, select { font-size: 16px !important; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const WORKER_URL = "https://myfitlog-notion-proxy.morinki220.workers.dev";
const DB = {
  training: "3470bbb3ed76818e969cc5a61f3dc492",
  food:     "3470bbb3ed76814db096e4c8d78ddca2",
  sleep:    "3800bbb3ed768084b0f0dedda842ca71",
};

async function notionQuery(dbId, sorts=[]) {
  const res = await fetch(`${WORKER_URL}/notion/databases/${dbId}/query`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({sorts, page_size: 50}),
  });
  const data = await res.json();
  return data.results || [];
}
async function notionCreate(dbId, properties) {
  const res = await fetch(`${WORKER_URL}/notion/pages`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({parent:{database_id:dbId}, properties}),
  });
  return await res.json();
}
async function notionUpdate(pageId, properties) {
  const res = await fetch(`${WORKER_URL}/notion/pages/${pageId}`, {
    method:"PATCH", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({properties}),
  });
  return await res.json();
}
async function uploadToR2(file, key) {
  const res = await fetch(`${WORKER_URL}/r2/${key}`, {
    method:"PUT",
    headers:{"Content-Type": file.type},
    body: file,
  });
  return await res.json();
}

// Claude APIでメッセージ生成
async function generateClaudeMessage(sleepData) {
  const prompt = `あなたはフィットネス＆生活改善コーチのClaudeです。
以下のユーザーの昨日の記録を見て、今朝の短い励ましメッセージを日本語で生成してください。
メッセージは2〜3文で、絵文字を使って明るく、具体的に褒めたり、改善ポイントをやさしく伝えてください。

昨日の記録:
- 就寝: ${sleepData.bedtime || "未記録"}
- 起床: ${sleepData.waketime || "未記録"}
- 睡眠時間: ${sleepData.sleepHours || 0}時間
- 仮眠キープ: ${sleepData.napKept ? "できた✅" : "できなかった❌"}
- 白湯: ${sleepData.hotwater ? "✅" : "❌"}
- 日経: ${sleepData.nikkei ? "✅" : "❌"}
- 朝日: ${sleepData.sunlight ? "✅" : "❌"}
- 外気: ${sleepData.outside ? "✅" : "❌"}
- 気分: ${sleepData.mood}/5

メッセージだけを返してください（前置き不要）。`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }],
      }),
    });
    const data = await res.json();
    return data.content?.[0]?.text || "今日も一日頑張りましょう！💪";
  } catch(e) {
    return "今日も一日頑張りましょう！💪🌿";
  }
}

const USERS = {

const TABS      = ["トレーニング","食事・写真","睡眠・習慣"];

function BgDeco() {
  const s=[
    {w:110,h:110,t:"2%",l:"4%",c:"#b8f0d0",r:30,op:0.45,d:0},
    {w:65,h:65,t:"8%",l:"76%",c:"#c8f0e0",r:"50%",op:0.4,d:1.2},
    {w:140,h:140,t:"28%",l:"70%",c:"#a8e8c0",r:44,op:0.32,d:0.5},
    {w:55,h:55,t:"48%",l:"1%",c:"#d0f4e0",r:"50%",op:0.42,d:2},
    {w:95,h:95,t:"60%",l:"52%",c:"#b0ecd0",r:34,op:0.36,d:0.8},
    {w:70,h:70,t:"76%",l:"16%",c:"#c0f0d8",r:"50%",op:0.42,d:1.5},
  ];
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",overflow:"hidden",zIndex:0}}>
      {s.map((b,i)=>(
        <div key={i} style={{position:"absolute",width:b.w,height:b.h,top:b.t,left:b.l,
          borderRadius:b.r,background:b.c,opacity:b.op,filter:"blur(3px)",
          animation:`floatS ${4.5+i*0.5}s ease-in-out infinite`,animationDelay:`${b.d}s`}}/>
      ))}
    </div>
  );
}

function LoadingSpinner({msg="読み込み中..."}) {
  return (
    <div style={{textAlign:"center",padding:"60px 20px",color:"#4aaa7a"}}>
      <div style={{fontSize:36,marginBottom:12,animation:"spin 1s linear infinite",display:"inline-block"}}>🌿</div>
      <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:14}}>{msg}</div>
    </div>
  );
}

function Toast({msg,ok}) {
  return (
    <div style={{
      position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%)",
      background:ok?"rgba(30,120,70,0.95)":"rgba(180,40,40,0.95)",
      color:"#fff",padding:"12px 20px",borderRadius:16,zIndex:2000,
      fontSize:13,fontFamily:"'Noto Sans JP',sans-serif",
      boxShadow:"0 4px 20px rgba(0,0,0,0.25)",maxWidth:320,textAlign:"center"}}>
      {msg}
    </div>
  );
}

function LoginScreen({onLogin}) {
  const [sel,setSel]=useState(null);
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [shk,setShk]=useState(false);
  const tryLogin=()=>{
    const u=USERS[sel];
    if(u&&u.password===pw){onLogin({id:sel,...u});}
    else{setErr("パスワードが正しくありません");setShk(true);setTimeout(()=>setShk(false),500);}
  };
  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",
      background:"linear-gradient(145deg,#d4f4e4 0%,#c0ecd8 35%,#a8e4cc 65%,#cef0e0 100%)",
      padding:"24px 20px",paddingTop:"env(safe-area-inset-top,24px)",
      paddingBottom:"env(safe-area-inset-bottom,24px)",
      position:"relative",overflow:"hidden"}}>
      <BgDeco/>
      <div style={{background:"rgba(255,255,255,0.93)",borderRadius:28,padding:"36px 24px",
        width:"100%",maxWidth:380,boxShadow:"0 10px 48px rgba(30,150,90,0.20)",
        backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",
        border:"2px solid rgba(140,220,180,0.6)",position:"relative",zIndex:10,
        animation:shk?"shakePop 0.4s ease":"popIn 0.5s cubic-bezier(0.34,1.56,0.64,1)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:56,marginBottom:8}}>🏋️</div>
          <div style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:26,color:"#1a7a4a"}}>MY FIT LOG</div>
          <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:13,color:"#5a9a7a",marginTop:4}}>Notion連携版 🌿</div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:800,color:"#1a7a4a",fontFamily:"'Nunito',sans-serif",marginBottom:12,textAlign:"center"}}>アカウントを選択</div>
          <div style={{display:"flex",gap:12}}>
            {Object.entries(USERS).map(([id,u])=>(
              <button key={id} onClick={()=>{setSel(id);setPw("");setErr("");}} style={{
                flex:1,padding:"20px 10px",borderRadius:18,cursor:"pointer",
                background:sel===id?"linear-gradient(135deg,#4ac890,#1a7a4a)":"rgba(210,245,228,0.7)",
                border:sel===id?"2px solid #1a7a4a":"2px solid rgba(120,200,160,0.5)",
                color:sel===id?"#fff":"#1a7a4a",fontFamily:"'Nunito',sans-serif",fontWeight:900,
                transition:"all 0.2s",WebkitTapHighlightColor:"transparent",touchAction:"manipulation"}}>
                <div style={{fontSize:36,marginBottom:6}}>{u.icon}</div>
                <div style={{fontSize:17}}>{u.name}</div>
                <div style={{fontSize:11,opacity:0.8,marginTop:3}}>メンバー</div>
              </button>
            ))}
          </div>
        </div>
        {sel&&(
          <div style={{marginBottom:16}}>
            <input type="password" value={pw} placeholder="パスワードを入力"
              onChange={e=>{setPw(e.target.value);setErr("");}}
              onKeyDown={e=>e.key==="Enter"&&tryLogin()}
              style={{width:"100%",padding:"15px 16px",borderRadius:14,border:"2px solid #a0d8b8",
                fontSize:16,fontFamily:"'Noto Sans JP',sans-serif",background:"#f0faf5",color:"#1a4a3a",outline:"none"}}
              autoFocus/>
          </div>
        )}
        {err&&<div style={{fontSize:13,color:"#cc3333",textAlign:"center",marginBottom:12,fontFamily:"'Noto Sans JP',sans-serif"}}>⚠️ {err}</div>}
        <button onClick={tryLogin} disabled={!sel||!pw} style={{
          width:"100%",padding:"16px",borderRadius:16,border:"none",
          background:sel&&pw?"linear-gradient(135deg,#4ac890,#1a7a4a)":"#c0e0d0",
          color:sel&&pw?"#fff":"#7ab89a",fontSize:17,fontWeight:900,
          fontFamily:"'Nunito',sans-serif",cursor:sel&&pw?"pointer":"default",
          WebkitTapHighlightColor:"transparent",touchAction:"manipulation"}}>
          ログイン 💪
        </button>
      </div>
    </div>
  );
}

function MediaViewer({mediaKey, mediaType}) {
  const url = `${WORKER_URL}/r2/${mediaKey}`;
  if (!mediaKey) return null;
  const isVideo = mediaType === "video" || mediaKey.match(/\.(mp4|mov|avi|webm)$/i);
  return (
    <div style={{marginTop:12,borderRadius:14,overflow:"hidden",background:"#000"}}>
      {isVideo ? (
        <video controls style={{width:"100%",maxHeight:300,display:"block"}} src={url}/>
      ) : (
        <img src={url} alt="写真" style={{width:"100%",maxHeight:300,objectFit:"cover",display:"block"}}/>
      )}
    </div>
  );
}

function parseTraining(page) {
  const p = page.properties;
  const sets = p["セット数"]?.number || 1;
  const bodyPart = p["部位"]?.select?.name || "胸";
  return {
    id: page.id,
    date: p["日付"]?.date?.start || new Date().toISOString().slice(0,10),
    exercise: p["種目名"]?.title?.[0]?.plain_text || "",
    bodyPart,
    type: p["タイプ"]?.select?.name || "マシーン",
    sets: Array.from({length:sets}, ()=>({reps:10})),
    notes: p["メモ"]?.rich_text?.[0]?.plain_text || "",
    emoji: BP_ICONS[bodyPart] || "💪",
    mediaKey: p["メディアキー"]?.rich_text?.[0]?.plain_text || "",
    mediaType: p["メディアタイプ"]?.rich_text?.[0]?.plain_text || "",
  };
}

function TrainingCard({rec, onMediaUpload}) {
  const [open,setOpen]=useState(false);
  const [uploading,setUploading]=useState(false);
  const fileRef=useRef(null);
  const tc=TYPE_COL[rec.type]||{};

  const handleFileChange=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    setUploading(true);
    try {
      const ext=file.name.split(".").pop();
      const key=`training/${rec.id}_${Date.now()}.${ext}`;
      const mediaType=file.type.startsWith("video")?"video":"image";
      await uploadToR2(file,key);
      await onMediaUpload(rec.id, key, mediaType);
    } catch(err){console.error(err);}
    setUploading(false);
    e.target.value="";
  };

  return (
    <div style={{background:"rgba(255,255,255,0.88)",borderRadius:20,
      border:`2px solid ${open?"#4ac890":"rgba(150,215,185,0.7)"}`,padding:"16px",
      boxShadow:"0 3px 18px rgba(30,150,80,0.10)"}}>
      <div onClick={()=>setOpen(o=>!o)} style={{cursor:"pointer"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
          <div style={{width:48,height:48,borderRadius:14,flexShrink:0,
            background:"linear-gradient(135deg,#c0f0d8,#a0e8c0)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{rec.emoji}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:16,fontWeight:800,color:"#1a4a3a",fontFamily:"'Nunito',sans-serif",
              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{rec.exercise}</div>
            <div style={{fontSize:12,color:"#5a9a7a",fontFamily:"'Noto Sans JP',sans-serif",marginTop:2}}>
              {rec.date.replace(/-/g,"/")} · {rec.sets.length}セット
            </div>
          </div>
          <div style={{display:"flex",gap:5,flexShrink:0,flexDirection:"column",alignItems:"flex-end"}}>
            <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:800,
              background:tc.bg||"#e8f8f0",color:tc.text||"#1a7a4a",border:`1px solid ${tc.border||"#a0d8b8"}`,fontFamily:"'Nunito',sans-serif"}}>{rec.type}</span>
            <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,
              background:"#e8f8f0",color:"#1a7a4a",border:"1px solid #a0d8b8",
              fontFamily:"'Noto Sans JP',sans-serif"}}>{rec.bodyPart}</span>
          </div>
        </div>
      </div>
      {open&&(
        <div style={{marginTop:10,borderTop:"1.5px dashed #a0d8b8",paddingTop:12}}>
          {rec.notes&&(
            <div style={{fontSize:13,color:"#3a7a5a",padding:"10px 14px",marginBottom:12,
              background:"#f0faf5",borderRadius:12,borderLeft:"4px solid #4ac890",
              fontFamily:"'Noto Sans JP',sans-serif",lineHeight:1.6}}>{rec.notes}</div>
          )}
          {rec.mediaKey ? (
            <MediaViewer mediaKey={rec.mediaKey} mediaType={rec.mediaType}/>
          ) : (
            <div onClick={()=>fileRef.current?.click()} style={{
              width:"100%",height:110,borderRadius:14,cursor:"pointer",
              background:"linear-gradient(135deg,#e8f8f0,#d8f4e8)",
              border:"2px dashed #7acca0",
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6}}>
              {uploading ? (
                <div style={{fontSize:13,color:"#3a9a6a",fontFamily:"'Noto Sans JP',sans-serif"}}>
                  <span style={{animation:"spin 1s linear infinite",display:"inline-block",marginRight:8}}>🌿</span>
                  アップロード中...
                </div>
              ) : (
                <>
                  <div style={{fontSize:28}}>📸</div>
                  <div style={{fontSize:13,color:"#3a9a6a",fontFamily:"'Noto Sans JP',sans-serif"}}>写真・動画を追加</div>
                </>
              )}
            </div>
          )}
          <input ref={fileRef} type="file" accept="image/*,video/*" style={{display:"none"}}
            onChange={handleFileChange}/>
        </div>
      )}
    </div>
  );
}

function TrainingTab() {
  const [training,setTraining]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState(null);
  const [fp,setFp]=useState("すべて");
  const [ft,setFt]=useState("すべて");
  const [showAdd,setShowAdd]=useState(false);
  const [addForm,setAddForm]=useState({exercise:"",bodyPart:"胸",type:"マシーン",sets:[{weight:"",reps:""}],notes:"",emoji:"🤜"});
  const emojis=["🤜","💪","🦵","🏅","🔄","⚡","🤸","🏃","🧘","🏊","🚴","🎯"];

  const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),3000);};
  const load=useCallback(async()=>{
    setLoading(true);
    try {
      const pages=await notionQuery(DB.training,[{property:"日付",direction:"descending"}]);
      setTraining(pages.map(parseTraining));
    } catch(e){console.error(e);}
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const handleAdd=async()=>{
    if(!addForm.exercise.trim())return;
    setSaving(true);
    try {
      await notionCreate(DB.training,{
        "種目名":{title:[{text:{content:addForm.exercise}}]},
        "部位":{select:{name:addForm.bodyPart}},
        "タイプ":{select:{name:addForm.type}},
        "セット数":{number:addForm.sets.length},
        "メモ":{rich_text:addForm.notes?[{text:{content:addForm.notes}}]:[]},
        "日付":{date:{start:new Date().toISOString().slice(0,10)}},
        "追加者":{select:{name:"Ayumi"}},
        "完了":{checkbox:false},
      });
      setAddForm({exercise:"",bodyPart:"胸",type:"マシーン",sets:[{weight:"",reps:""}],notes:"",emoji:"🤜"});
      setShowAdd(false);
      showToast("✅ 保存しました！");
      await load();
    } catch(e){showToast("⚠️ 保存に失敗しました",false);}
    setSaving(false);
  };

  const handleMediaUpload=async(recordId, key, mediaType)=>{
    try {
      await notionUpdate(recordId,{
        "メディアキー":{rich_text:[{text:{content:key}}]},
        "メディアタイプ":{rich_text:[{text:{content:mediaType}}]},
      });
      showToast("✅ 写真・動画を保存しました！");
      await load();
    } catch(e){showToast("⚠️ 保存に失敗しました",false);}
  };

  const filtered=training.filter(r=>(fp==="すべて"||r.bodyPart===fp)&&(ft==="すべて"||r.type===ft));
  const grouped=filtered.reduce((acc,r)=>{if(!acc[r.date])acc[r.date]=[];acc[r.date].push(r);return acc;},{});

  return (
    <div style={{padding:"16px 16px 100px",position:"relative",zIndex:1}}>
      {toast&&<Toast msg={toast.msg} ok={toast.ok}/>}
      <div style={{overflowX:"auto",marginBottom:10,WebkitOverflowScrolling:"touch"}}>
        <div style={{display:"flex",gap:8,paddingBottom:4,width:"max-content"}}>
          {BODY_PARTS.map(p=>(
            <button key={p} onClick={()=>setFp(p)} style={{
              padding:"9px 16px",borderRadius:22,minHeight:44,
              background:fp===p?"linear-gradient(135deg,#4ac890,#1a7a4a)":"rgba(255,255,255,0.78)",
              color:fp===p?"#fff":"#3a8a5a",fontSize:13,cursor:"pointer",
              fontFamily:"'Noto Sans JP',sans-serif",whiteSpace:"nowrap",
              border:fp===p?"none":"1.5px solid rgba(130,205,165,0.8)",
              fontWeight:fp===p?700:400,touchAction:"manipulation"}}>
              {BP_ICONS[p]} {p}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {TYPES.map(t=>(
          <button key={t} onClick={()=>setFt(t)} style={{
            flex:1,padding:"10px 4px",borderRadius:12,minHeight:44,
            background:ft===t?"linear-gradient(135deg,#4ac890,#1a7a4a)":"rgba(255,255,255,0.78)",
            color:ft===t?"#fff":"#3a8a5a",fontSize:12,cursor:"pointer",
            fontFamily:"'Noto Sans JP',sans-serif",
            border:ft===t?"none":"1.5px solid rgba(130,205,165,0.8)",
            fontWeight:ft===t?700:400,touchAction:"manipulation"}}>{t}</button>
        ))}
      </div>
      <button onClick={load} style={{
        width:"100%",padding:"11px",borderRadius:14,marginBottom:14,
        background:"rgba(255,255,255,0.8)",border:"1.5px solid #a0d8b8",
        color:"#1a7a4a",fontSize:13,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif"}}>
        🔄 最新データを取得
      </button>
      {loading?<LoadingSpinner msg="トレーニング記録を読み込み中..."/>:(
        <>
          <div style={{fontSize:12,fontWeight:800,color:"#2a8a5a",marginBottom:14,fontFamily:"'Nunito',sans-serif"}}>{filtered.length} RECORDS 💪</div>
          {Object.entries(grouped).map(([date,recs])=>(
            <div key={date} style={{marginBottom:22}}>

function FoodTab() {
  const [foods,setFoods]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [toast,setToast]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({memo:"",mediaKey:"",mediaType:""});
  const fileRef=useRef(null);

  const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),3000);};

  const parseFood=(page)=>{
    const p=page.properties;
    return {
      id:page.id,
      date:p["日付"]?.date?.start||new Date().toISOString().slice(0,10),
      memo:p["メモ"]?.rich_text?.[0]?.plain_text||"",
      mediaKey:p["メディアキー"]?.rich_text?.[0]?.plain_text||"",
      mediaType:p["メディアタイプ"]?.rich_text?.[0]?.plain_text||"",
    };
  };

  const load=useCallback(async()=>{
    setLoading(true);
    try {
      const pages=await notionQuery(DB.food,[{property:"日付",direction:"descending"}]);
      setFoods(pages.map(parseFood));
    } catch(e){console.error(e);}
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const handleFileSelect=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    setUploading(true);
    try {
      const ext=file.name.split(".").pop();
      const key=`food/${Date.now()}.${ext}`;
      const mediaType=file.type.startsWith("video")?"video":"image";
      await uploadToR2(file,key);
      setForm(f=>({...f,mediaKey:key,mediaType}));
      showToast("✅ 写真を選択しました！");
    } catch(e){showToast("⚠️ 写真の選択に失敗しました",false);}
    setUploading(false);
    e.target.value="";
  };

  const handleSave=async()=>{
    setSaving(true);
    try {
      await notionCreate(DB.food,{
        "食事内容":{title:[{text:{content:form.memo||"食事記録"}}]},
        "メモ":{rich_text:form.memo?[{text:{content:form.memo}}]:[]},
        "メディアキー":{rich_text:form.mediaKey?[{text:{content:form.mediaKey}}]:[]},
        "メディアタイプ":{rich_text:form.mediaType?[{text:{content:form.mediaType}}]:[]},
        "日付":{date:{start:new Date().toISOString().slice(0,10)}},
      });
      setForm({memo:"",mediaKey:"",mediaType:""});
      setShowForm(false);
      showToast("✅ Notionに保存しました！");
      await load();
    } catch(e){showToast("⚠️ 保存に失敗しました",false);}
    setSaving(false);
  };

  return (
    <div style={{padding:"16px 16px 100px",position:"relative",zIndex:1}}>
      {toast&&<Toast msg={toast.msg} ok={toast.ok}/>}
      <button onClick={()=>setShowForm(s=>!s)} style={{
        width:"100%",padding:"15px",borderRadius:16,marginBottom:16,minHeight:52,
        background:showForm?"rgba(200,240,220,0.6)":"linear-gradient(135deg,#4ac890,#1a7a4a)",
        border:showForm?"2px dashed #4ac890":"none",
        color:showForm?"#1a7a4a":"#fff",fontSize:16,fontWeight:900,
        cursor:"pointer",fontFamily:"'Nunito',sans-serif",touchAction:"manipulation"}}>
        {showForm?"▲ 閉じる":"＋ 食事を記録する"}
      </button>
      {showForm&&(
        <div style={{background:"rgba(255,255,255,0.93)",borderRadius:20,border:"2px solid #a0d8b8",padding:"16px",marginBottom:16}}>
          <div onClick={()=>fileRef.current?.click()} style={{
            width:"100%",minHeight:160,borderRadius:14,cursor:"pointer",marginBottom:12,
            background:form.mediaKey?"#000":"linear-gradient(135deg,#e8f8f0,#d8f4e8)",
            border:form.mediaKey?"none":"2px dashed #7acca0",
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
            overflow:"hidden"}}>
            {form.mediaKey ? (
              <img src={`${WORKER_URL}/r2/${form.mediaKey}`} alt="選択した写真"
                style={{width:"100%",maxHeight:200,objectFit:"cover",display:"block"}}/>
            ) : uploading ? (
              <div style={{fontSize:13,color:"#3a9a6a",fontFamily:"'Noto Sans JP',sans-serif"}}>
                <span style={{animation:"spin 1s linear infinite",display:"inline-block",marginRight:8}}>🌿</span>
                アップロード中...
              </div>
            ) : (
              <>
                <div style={{fontSize:40,marginBottom:8}}>📷</div>
                <div style={{fontSize:14,color:"#3a9a6a",fontFamily:"'Noto Sans JP',sans-serif"}}>写真をタップして選択</div>
              </>
            )}
          </div>
          <input ref={fileRef} type="file" accept="image/*,video/*" style={{display:"none"}} onChange={handleFileSelect}/>
          <textarea placeholder="メモ（今日の食事内容など）" value={form.memo}
            onChange={e=>setForm(f=>({...f,memo:e.target.value}))}
            style={{width:"100%",padding:"13px",borderRadius:12,marginBottom:12,
              border:"1.5px solid #a0d8b8",background:"#f0faf5",color:"#1a4a3a",
              fontSize:16,minHeight:100,resize:"vertical",outline:"none"}}/>
          <button onClick={handleSave} disabled={saving||(!form.mediaKey&&!form.memo)} style={{
            width:"100%",padding:"14px",borderRadius:14,border:"none",minHeight:52,
            background:saving||(!form.mediaKey&&!form.memo)?"#c0e0d0":"linear-gradient(135deg,#4ac890,#1a7a4a)",
            color:"#fff",fontSize:16,fontWeight:900,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>
            {saving?"保存中...":"Notionに保存 🥗"}
          </button>
        </div>
      )}
      {loading?<LoadingSpinner msg="食事記録を読み込み中..."/>:(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {foods.map(r=>(
            <div key={r.id} style={{background:"rgba(255,255,255,0.88)",borderRadius:18,
              border:"2px solid rgba(150,215,185,0.7)",overflow:"hidden"}}>
              {r.mediaKey&&<MediaViewer mediaKey={r.mediaKey} mediaType={r.mediaType}/>}
              <div style={{padding:"12px 14px"}}>
                <div style={{fontSize:11,color:"#8ab8a0",marginBottom:4,fontFamily:"'Noto Sans JP',sans-serif"}}>{r.date.replace(/-/g,"/")}</div>
                {r.memo&&<div style={{fontSize:14,color:"#2a4a3a",fontFamily:"'Noto Sans JP',sans-serif",lineHeight:1.7}}>{r.memo}</div>}
              </div>
            </div>
          ))}
          {foods.length===0&&<div style={{textAlign:"center",padding:"40px",color:"#8ab8a0",fontFamily:"'Noto Sans JP',sans-serif"}}>食事記録がありません</div>}
        </div>
      )}
    </div>
  );
}

function SleepTab() {
  const [records,setRecords]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [generatingMsg,setGeneratingMsg]=useState(false);
  const [claudeMessage,setClaudeMessage]=useState(null);
  const [toast,setToast]=useState(null);
  const [showForm,setShowForm]=useState(false);

  const today = new Date().toISOString().slice(0,10);
  const [form,setForm]=useState({
    bedtime:"23:00", waketime:"07:00",
    napKept:true,
    hotwater:false, nikkei:false, sunlight:false, outside:false,
    mood:3, memo:""
  });

  const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),3000);};

  const calcSleep=(bed,wake)=>{
    try {
      const [bh,bm]=bed.split(":").map(Number);
      const [wh,wm]=wake.split(":").map(Number);
      let mins=(wh*60+wm)-(bh*60+bm);
      if(mins<0)mins+=24*60;
      return (mins/60).toFixed(1);
    } catch{return 0;}
  };

  const parseSleep=(page)=>{
    const p=page.properties;
    return {
      id:page.id,
      date:p["日付"]?.date?.start||"",
      bedtime:p["就寝時刻"]?.rich_text?.[0]?.plain_text||"",
      waketime:p["起床時刻"]?.rich_text?.[0]?.plain_text||"",
      sleepHours:p["睡眠時間"]?.number||0,
      napKept:p["仮眠キープ"]?.checkbox||false,
      hotwater:p["白湯"]?.checkbox||false,
      nikkei:p["日経"]?.checkbox||false,
      sunlight:p["朝日"]?.checkbox||false,
      outside:p["外気"]?.checkbox||false,
      mood:p["気分"]?.number||3,
      memo:p["メモ"]?.rich_text?.[0]?.plain_text||"",
    };
  };

  const load=useCallback(async()=>{
    setLoading(true);
    try {
      const pages=await notionQuery(DB.sleep,[{property:"日付",direction:"descending"}]);
      setRecords(pages.map(parseSleep));
    } catch(e){console.error(e);}
    setLoading(false);
  },[]);

  useEffect(()=>{load();},[load]);

  // 最新の記録を見てClaudeメッセージを生成
  useEffect(()=>{
    if(records.length>0 && !claudeMessage) {
      const latest = records[0];
      setGeneratingMsg(true);
      generateClaudeMessage(latest).then(msg=>{
        setClaudeMessage(msg);
        setGeneratingMsg(false);
      });
    }
  },[records]);

  const handleSave=async()=>{
    setSaving(true);
    const sleepHours=Number(calcSleep(form.bedtime,form.waketime));
    try {
      await notionCreate(DB.sleep,{
        "記録日":{title:[{text:{content:today}}]},
        "日付":{date:{start:today}},
        "就寝時刻":{rich_text:[{text:{content:form.bedtime}}]},
        "起床時刻":{rich_text:[{text:{content:form.waketime}}]},
        "睡眠時間":{number:sleepHours},
        "仮眠キープ":{checkbox:form.napKept},
        "白湯":{checkbox:form.hotwater},
        "日経":{checkbox:form.nikkei},
        "朝日":{checkbox:form.sunlight},
        "外気":{checkbox:form.outside},
        "気分":{number:form.mood},
        "メモ":{rich_text:form.memo?[{text:{content:form.memo}}]:[]},
      });
      setShowForm(false);
      showToast("✅ 今日の記録を保存しました！");
      setClaudeMessage(null);
      await load();
    } catch(e){showToast("⚠️ 保存に失敗しました",false);}
    setSaving(false);
  };

  const moodEmojis=["😴","😪","😐","😊","🌟"];
  const sleepHours=calcSleep(form.bedtime,form.waketime);
  const last7=records.slice(0,7).reverse();

  // 連続記録日数
  const streak = records.filter((r,i)=>{
    if(i===0) return true;
    const d1=new Date(records[i-1].date);
    const d2=new Date(r.date);
    return (d1-d2)/(1000*60*60*24)===1;
  }).length;

  return (
    <div style={{padding:"16px 16px 100px",position:"relative",zIndex:1}}>
      {toast&&<Toast msg={toast.msg} ok={toast.ok}/>}

      {/* Claudeからのメッセージ */}
      {(generatingMsg||claudeMessage)&&(
        <div style={{
          background:"linear-gradient(135deg,#1a4a7a,#2a6aaa)",
          borderRadius:20,padding:"16px",marginBottom:16,
          boxShadow:"0 4px 20px rgba(30,80,160,0.25)",
          animation:"fadeIn 0.5s ease"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{fontSize:20}}>🤖</span>
            <span style={{fontSize:13,fontWeight:800,color:"rgba(255,255,255,0.9)",fontFamily:"'Nunito',sans-serif"}}>Claudeからのメッセージ</span>
          </div>
          {generatingMsg ? (
            <div style={{fontSize:13,color:"rgba(255,255,255,0.7)",fontFamily:"'Noto Sans JP',sans-serif",display:"flex",alignItems:"center",gap:8}}>
              <span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>🌿</span>
              メッセージを生成中...
            </div>
          ) : (
            <div style={{fontSize:14,color:"#fff",fontFamily:"'Noto Sans JP',sans-serif",lineHeight:1.8}}>
              {claudeMessage}
            </div>
          )}
        </div>
      )}

      {/* 連続記録バッジ */}
      {streak>=2&&(
        <div style={{
          background:"linear-gradient(135deg,#ffb347,#ff8c00)",
          borderRadius:16,padding:"12px 16px",marginBottom:16,
          display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:24}}>🔥</span>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:"#fff",fontFamily:"'Nunito',sans-serif"}}>{streak}日連続記録中！</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.85)",fontFamily:"'Noto Sans JP',sans-serif"}}>この調子で続けましょう！</div>
          </div>
        </div>
      )}

      {/* 今日の記録ボタン */}
      <button onClick={()=>setShowForm(s=>!s)} style={{
        width:"100%",padding:"15px",borderRadius:16,marginBottom:16,minHeight:52,
        background:showForm?"rgba(200,230,255,0.6)":"linear-gradient(135deg,#6ab8f0,#3a7abf)",
        border:showForm?"2px dashed #6ab8f0":"none",
        color:showForm?"#1a4a7a":"#fff",fontSize:16,fontWeight:900,
        cursor:"pointer",fontFamily:"'Nunito',sans-serif",touchAction:"manipulation"}}>
        {showForm?"▲ 閉じる":"🌙 今日の睡眠・習慣を記録"}
      </button>

      {showForm&&(
        <div style={{background:"rgba(255,255,255,0.96)",borderRadius:20,border:"2px solid #a0c8e8",padding:"16px",marginBottom:16}}>
          {/* 今日の日付表示 */}
          <div style={{textAlign:"center",marginBottom:14,fontSize:13,color:"#5a8aaa",fontFamily:"'Noto Sans JP',sans-serif",
            background:"#f0f6fc",borderRadius:10,padding:"8px"}}>
            📅 {today.replace(/-/g,"/")}（今日）の記録

          {/* 就寝・起床 */}

                    background:"#f0f6fc",color:"#1a3a5a",fontSize:16,outline:"none"}}/>

              <div style={{flex:1}}>

              {[{v:true,l:"守れた ✅"},{v:false,l:"守れず ❌"}].map(opt=>(
                <button key={String(opt.v)} onClick={()=>setForm(f=>({...f,napKept:opt.v}))} style={{
                  flex:1,padding:"12px",borderRadius:12,cursor:"pointer",fontSize:14,
                  background:form.napKept===opt.v?"linear-gradient(135deg,#4ac890,#1a7a4a)":"#e8f8f0",
                  color:form.napKept===opt.v?"#fff":"#1a7a4a",border:"none",
                  fontFamily:"'Noto Sans JP',sans-serif",fontWeight:700}}>{opt.l}</button>
              ))}
            </div>
          </div>

          {/* 朝ルーティン */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:800,color:"#1a4a7a",fontFamily:"'Nunito',sans-serif",marginBottom:8}}>☀️ 朝ルーティン</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[{k:"hotwater",l:"白湯を飲んだ",icon:"☕"},{k:"nikkei",l:"日経を読んだ",icon:"📰"},
                {k:"sunlight",l:"朝日を浴びた",icon:"🌅"},{k:"outside",l:"外に出た",icon:"🚶"}].map(item=>(
                <button key={item.k} onClick={()=>setForm(f=>({...f,[item.k]:!f[item.k]}))} style={{
                  padding:"12px 8px",borderRadius:12,cursor:"pointer",fontSize:12,
                  background:form[item.k]?"linear-gradient(135deg,#4ac890,#1a7a4a)":"#e8f8f0",
                  color:form[item.k]?"#fff":"#1a7a4a",border:"none",
                  fontFamily:"'Noto Sans JP',sans-serif",fontWeight:700,
                  display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                  <span style={{fontSize:16}}>{item.icon}</span>{item.l}
                </button>
              ))}
            </div>
          </div>

          {/* 気分 */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:800,color:"#1a4a7a",fontFamily:"'Nunito',sans-serif",marginBottom:8}}>💫 今朝の調子</div>
            <div style={{display:"flex",gap:6,justifyContent:"center"}}>
              {moodEmojis.map((em,i)=>(
                <button key={i} onClick={()=>setForm(f=>({...f,mood:i+1}))} style={{
                  width:52,height:52,borderRadius:14,fontSize:26,cursor:"pointer",
                  background:form.mood===i+1?"linear-gradient(135deg,#ffe082,#ffb300)":"#f5f5f5",
                  border:form.mood===i+1?"2px solid #ffb300":"1.5px solid #ddd"}}>
                  {em}
                </button>
              ))}
            </div>
          </div>

          <textarea placeholder="メモ（気づいたことなど）" value={form.memo}
            onChange={e=>setForm(f=>({...f,memo:e.target.value}))}
            style={{width:"100%",padding:"12px",borderRadius:12,marginBottom:12,
              border:"1.5px solid #a0c8e8",background:"#f0f6fc",color:"#1a3a5a",
              fontSize:16,minHeight:70,resize:"vertical",outline:"none"}}/>

          <button onClick={handleSave} disabled={saving} style={{
            width:"100%",padding:"15px",borderRadius:14,border:"none",minHeight:52,
            background:saving?"#c0d8f0":"linear-gradient(135deg,#6ab8f0,#3a7abf)",
            color:"#fff",fontSize:16,fontWeight:900,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>
            {saving?"保存中...":"今日の記録を保存 🌙"}
          </button>
        </div>
      )}

      {/* 直近7日グラフ */}
      {!loading&&last7.length>0&&(
        <div style={{background:"rgba(255,255,255,0.88)",borderRadius:20,
          border:"2px solid rgba(100,180,230,0.5)",padding:"16px",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:800,color:"#1a4a7a",fontFamily:"'Nunito',sans-serif",marginBottom:12}}>
            📊 直近の睡眠時間
          </div>
          <div style={{display:"flex",gap:4,alignItems:"flex-end",height:80}}>
            {last7.map((r,i)=>{
              const h=Number(r.sleepHours)||0;
              const barH=Math.max(10,(h/10)*70);
              const color=r.napKept?"#4ac890":h>=6?"#6ab8f0":"#ffb347";
              return (
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <div style={{fontSize:9,color:"#5a8aaa",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>{h}h</div>
                  <div style={{width:"100%",height:barH,borderRadius:"4px 4px 0 0",background:color,opacity:0.85}}/>
                  <div style={{fontSize:9,color:"#8ab0c8",fontFamily:"'Nunito',sans-serif"}}>
                    {r.date.slice(5).replace("-","/")}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:12,marginTop:8,justifyContent:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:11,color:"#4aaa7a",fontFamily:"'Noto Sans JP',sans-serif"}}>🟢 仮眠キープ</span>
            <span style={{fontSize:11,color:"#5a9abf",fontFamily:"'Noto Sans JP',sans-serif"}}>🔵 6h以上</span>
            <span style={{fontSize:11,color:"#cc8844",fontFamily:"'Noto Sans JP',sans-serif"}}>🟠 6h未満</span>
          </div>
        </div>
      )}

      {/* 記録一覧 */}
      {loading?<LoadingSpinner msg="睡眠記録を読み込み中..."/>:(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {records.map(r=>(
            <div key={r.id} style={{background:"rgba(255,255,255,0.88)",borderRadius:18,
              border:"2px solid rgba(100,180,230,0.4)",padding:"14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:13,fontWeight:800,color:"#1a4a7a",fontFamily:"'Nunito',sans-serif"}}>{r.date.replace(/-/g,"/")}</div>
                <div style={{fontSize:11,color:r.napKept?"#1a8a5a":"#cc4444",fontWeight:700,fontFamily:"'Noto Sans JP',sans-serif"}}>
                  {r.napKept?"✅ キープ":"❌ 守れず"}
                </div>
              </div>
              <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                <span style={{fontSize:12,background:"#e8f4fc",color:"#1a5a8a",padding:"3px 10px",borderRadius:20,fontFamily:"'Noto Sans JP',sans-serif"}}>
                  🛏 {r.bedtime}→{r.waketime}
                </span>
                <span style={{fontSize:12,background:"#e8f8f0",color:"#1a7a4a",padding:"3px 10px",borderRadius:20,fontFamily:"'Nunito',sans-serif",fontWeight:700}}>
                  😴 {r.sleepHours}h
                </span>
                <span style={{fontSize:14}}>{moodEmojis[(r.mood||3)-1]}</span>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[{k:"hotwater",l:"白湯",icon:"☕"},{k:"nikkei",l:"日経",icon:"📰"},
                  {k:"sunlight",l:"朝日",icon:"🌅"},{k:"outside",l:"外気",icon:"🚶"}].map(item=>(
                  <span key={item.k} style={{fontSize:11,padding:"2px 8px",borderRadius:20,
                    background:r[item.k]?"#e8f8f0":"#f5f5f5",
                    color:r[item.k]?"#1a7a4a":"#aaa",
                    border:`1px solid ${r[item.k]?"#a0d8b8":"#ddd"}`,
                    fontFamily:"'Noto Sans JP',sans-serif"}}>
                    {item.icon} {item.l}
                  </span>
                ))}
              </div>
              {r.memo&&<div style={{fontSize:12,color:"#5a7a9a",marginTop:6,fontFamily:"'Noto Sans JP',sans-serif"}}>{r.memo}</div>}
            </div>
          ))}
          {records.length===0&&<div style={{textAlign:"center",padding:"40px",color:"#8ab8a0",fontFamily:"'Noto Sans JP',sans-serif"}}>睡眠記録がありません</div>}
        </div>
      )}
    </div>
  );
}

function App() {
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState(0);
  if(!user)return <LoginScreen onLogin={setUser}/>;
  return (
    <div style={{minHeight:"100vh",
      background:"linear-gradient(145deg,#d4f4e4 0%,#c0ecd8 30%,#b0e4cc 60%,#ccf0e0 100%)",
      fontFamily:"'Noto Sans JP',sans-serif",maxWidth:480,margin:"0 auto",position:"relative"}}>
      <BgDeco/>
      <div style={{
        padding:"12px 16px 10px",paddingTop:"max(12px,env(safe-area-inset-top))",
        position:"sticky",top:0,zIndex:100,
        background:"rgba(190,236,212,0.88)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",
        borderBottom:"1.5px solid rgba(110,195,150,0.5)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:22}}>🏋️</span>
              <span style={{fontSize:20,fontWeight:900,color:"#1a6a3a",fontFamily:"'Nunito',sans-serif"}}>MY FIT LOG</span>
              <span style={{fontSize:10,background:"#4ac890",color:"#fff",padding:"2px 8px",borderRadius:20,fontFamily:"'Nunito',sans-serif",fontWeight:800}}>Notion</span>
            </div>
            <div style={{fontSize:12,color:"#3a8a5a",fontFamily:"'Noto Sans JP',sans-serif",marginTop:2}}>
              {user.icon} {user.name}さん、お疲れ様です！
            </div>
          </div>
          <button onClick={()=>setUser(null)} style={{
            padding:"8px 14px",borderRadius:12,minHeight:44,
            background:"rgba(255,255,255,0.75)",border:"1.5px solid #7acca0",color:"#1a6a3a",
            fontSize:13,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontWeight:600}}>
            ログアウト
          </button>
        </div>
        <div style={{display:"flex",gap:6}}>
          {TABS.map((t,i)=>(
            <button key={t} onClick={()=>setTab(i)} style={{
              flex:1,padding:"8px 4px",borderRadius:12,border:"none",minHeight:48,
              background:tab===i?"linear-gradient(135deg,#4ac890,#1a7a4a)":"rgba(255,255,255,0.65)",
              color:tab===i?"#fff":"#3a8a5a",fontSize:11,fontWeight:tab===i?900:500,cursor:"pointer",
              fontFamily:"'Nunito',sans-serif",transition:"all 0.2s",
              boxShadow:tab===i?"0 3px 12px rgba(30,140,80,0.32)":"none",touchAction:"manipulation"}}>
              <div style={{fontSize:16,marginBottom:2}}>{TAB_ICONS[i]}</div>
              <div>{t}</div>
            </button>
          ))}
        </div>
      </div>
      {tab===0&&<TrainingTab/>}
      {tab===1&&<FoodTab/>}
      {tab===2&&<SleepTab/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
