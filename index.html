<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>MY FIT LOG</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    body { overscroll-behavior-y: none; background: #c0ecd8; }
    ::-webkit-scrollbar { width: 0px; }
    input, textarea, select { font-size: 16px !important; }
    @keyframes floatS { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-14px) scale(1.03)} }
    @keyframes popIn { 0%{transform:scale(0.75);opacity:0} 70%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
    @keyframes shakePop { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ─── Notion設定 ───────────────────────────────────────────
const WORKER_URL = "https://myfitlog-notion-proxy.morinki220.workers.dev";
const DB = {
  training: "3470bbb3ed76818e969cc5a61f3dc492",
  health:   "3470bbb3ed76814db096e4c8d78ddca2",
  body:     "3470bbb3ed7681ca89e5fed0efe804fb",
  message:  "3470bbb3ed7681ce9d94eab4e5430bcb",
};

// ─── Notion API ───────────────────────────────────────────
async function notionQuery(dbId, sorts=[]) {
  const res = await fetch(`${WORKER_URL}/notion/databases/${dbId}/query`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({sorts}),
  });
  const data = await res.json();
  return data.results || [];
}
async function notionCreate(dbId, properties) {
  const res = await fetch(`${WORKER_URL}/notion/pages`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({parent:{database_id:dbId}, properties}),
  });
  return await res.json();
}

// ─── データ変換 ───────────────────────────────────────────
const BP_ICONS = {すべて:"🏅",胸:"🤜",背中:"🔄",脚:"🦵",肩:"🤸",腕:"💪",体幹:"⚡",臀部:"🍃"};

function parseTraining(page) {
  const p = page.properties;
  const sets = p["セット数"]?.number || 1;
  return {
    id: page.id,
    date: p["日付"]?.date?.start || new Date().toISOString().slice(0,10),
    exercise: p["種目名"]?.title?.[0]?.plain_text || "",
    bodyPart: p["部位"]?.select?.name || "胸",
    type: p["タイプ"]?.select?.name || "マシーン",
    sets: Array.from({length:sets}, ()=>({reps:10})),
    notes: p["メモ"]?.rich_text?.[0]?.plain_text || "",
    emoji: BP_ICONS[p["部位"]?.select?.name] || "💪",
    addedBy: p["追加者"]?.select?.name || "Ayumi",
  };
}
function parseHealth(page) {
  const p = page.properties;
  return {
    id: page.id,
    date: p["日付"]?.date?.start || new Date().toISOString().slice(0,10),
    category: p["タイミング"]?.select?.name || "朝食",
    title: p["食事内容"]?.title?.[0]?.plain_text || "",
    content: p["メモ"]?.rich_text?.[0]?.plain_text || "",
    kcal: p["カロリー(kcal)"]?.number || 0,
    protein: p["タンパク質(g)"]?.number || 0,
    carb: p["炭水化物(g)"]?.number || 0,
    fat: p["脂質(g)"]?.number || 0,
  };
}
function parseBody(page) {
  const p = page.properties;
  return {
    id: page.id,
    date: p["日付"]?.date?.start || new Date().toISOString().slice(0,10),
    weight: p["体重(kg)"]?.number || 0,
    fat: p["体脂肪率(%)"]?.number || 0,
    muscle: p["筋肉量(kg)"]?.number || 0,
    bmi: p["BMI"]?.number || 0,
    notes: p["メモ"]?.rich_text?.[0]?.plain_text || "",
  };
}
function parseMessage(page) {
  const p = page.properties;
  return {
    id: page.id,
    date: p["日付"]?.date?.start || new Date().toISOString().slice(0,10),
    title: p["タイトル"]?.title?.[0]?.plain_text || "",
    content: p["内容"]?.rich_text?.[0]?.plain_text || "",
    sender: p["送信者"]?.select?.name || "",
    category: p["カテゴリ"]?.select?.name || "",
    replied: p["返信済み"]?.checkbox || false,
  };
}

// ─── 認証 ─────────────────────────────────────────────────
const USERS = {
  Ayumi:   {password:"ayumi2021",  role:"member",  name:"Ayumi",  icon:"🌿"},
  Trainer: {password:"taturo2021", role:"trainer", name:"Taturo", icon:"🏋️"},
};

// ─── 定数 ─────────────────────────────────────────────────
const TABS      = ["トレーニング","食事・栄養","データ","メッセージ"];
const TAB_ICONS = ["💪","🌱","📊","💬"];
const BODY_PARTS= ["すべて","胸","背中","脚","肩","腕","体幹","臀部"];
const TYPES     = ["すべて","自重","マシーン","フリーウェイト"];
const TYPE_COL  = {
  自重:          {bg:"#e8f8f0",text:"#1a7a4a",border:"#7acca0"},
  マシーン:      {bg:"#e8f4f8",text:"#1a5a7a",border:"#7abccc"},
  フリーウェイト:{bg:"#f8f4e8",text:"#7a5a1a",border:"#ccb87a"},
};
const HEALTH_CATS = ["すべて","朝食","昼食","夕食","間食","プロテイン"];
const CAT_ICONS   = {すべて:"🌱",朝食:"🌅",昼食:"☀️",夕食:"🌙",間食:"🍎",プロテイン:"💪"};

// ─── 共通コンポーネント ───────────────────────────────────
function BgDeco() {
  const s=[
    {w:110,h:110,t:"2%",l:"4%",c:"#b8f0d0",r:30,op:0.45,d:0},
    {w:65,h:65,t:"8%",l:"76%",c:"#c8f0e0",r:"50%",op:0.4,d:1.2},
    {w:140,h:140,t:"28%",l:"70%",c:"#a8e8c0",r:44,op:0.32,d:0.5},
    {w:55,h:55,t:"48%",l:"1%",c:"#d0f4e0",r:"50%",op:0.42,d:2},
    {w:95,h:95,t:"60%",l:"52%",c:"#b0ecd0",r:34,op:0.36,d:0.8},
    {w:70,h:70,t:"76%",l:"16%",c:"#c0f0d8",r:"50%",op:0.42,d:1.5},
  ];
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",overflow:"hidden",zIndex:0}}>
      {s.map((b,i)=>(
        <div key={i} style={{position:"absolute",width:b.w,height:b.h,top:b.t,left:b.l,
          borderRadius:b.r,background:b.c,opacity:b.op,filter:"blur(3px)",
          animation:`floatS ${4.5+i*0.5}s ease-in-out infinite`,animationDelay:`${b.d}s`}}/>
      ))}
    </div>
  );
}

function LoadingSpinner({msg="読み込み中..."}) {
  return (
    <div style={{textAlign:"center",padding:"60px 20px",color:"#4aaa7a"}}>
      <div style={{fontSize:36,marginBottom:12,animation:"spin 1s linear infinite",display:"inline-block"}}>🌿</div>
      <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:14}}>{msg}</div>
    </div>
  );
}

function Toast({msg,ok}) {
  return (
    <div style={{
      position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%)",
      background:ok?"rgba(30,120,70,0.95)":"rgba(180,40,40,0.95)",
      color:"#fff",padding:"12px 20px",borderRadius:16,zIndex:2000,
      fontSize:13,fontFamily:"'Noto Sans JP',sans-serif",
      boxShadow:"0 4px 20px rgba(0,0,0,0.25)",maxWidth:320,textAlign:"center"}}>
      {msg}
    </div>
  );
}

// ─── ログイン ─────────────────────────────────────────────
function LoginScreen({onLogin}) {
  const [sel,setSel]=useState(null);
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [shk,setShk]=useState(false);
  const tryLogin=()=>{
    const u=USERS[sel];
    if(u&&u.password===pw){onLogin({id:sel,...u});}
    else{setErr("パスワードが正しくありません");setShk(true);setTimeout(()=>setShk(false),500);}
  };
  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",
      background:"linear-gradient(145deg,#d4f4e4 0%,#c0ecd8 35%,#a8e4cc 65%,#cef0e0 100%)",
      padding:"24px 20px",paddingTop:"env(safe-area-inset-top,24px)",
      paddingBottom:"env(safe-area-inset-bottom,24px)",
      position:"relative",overflow:"hidden"}}>
      <BgDeco/>
      <div style={{background:"rgba(255,255,255,0.93)",borderRadius:28,padding:"36px 24px",
        width:"100%",maxWidth:380,boxShadow:"0 10px 48px rgba(30,150,90,0.20)",
        backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",
        border:"2px solid rgba(140,220,180,0.6)",position:"relative",zIndex:10,
        animation:shk?"shakePop 0.4s ease":"popIn 0.5s cubic-bezier(0.34,1.56,0.64,1)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:56,marginBottom:8}}>🏋️</div>
          <div style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:26,color:"#1a7a4a"}}>MY FIT LOG</div>
          <div style={{fontFamily:"'Noto Sans JP',sans-serif",fontSize:13,color:"#5a9a7a",marginTop:4}}>Notion連携版 🌿</div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:800,color:"#1a7a4a",fontFamily:"'Nunito',sans-serif",marginBottom:12,textAlign:"center"}}>アカウントを選択</div>
          <div style={{display:"flex",gap:12}}>
            {Object.entries(USERS).map(([id,u])=>(
              <button key={id} onClick={()=>{setSel(id);setPw("");setErr("");}} style={{
                flex:1,padding:"20px 10px",borderRadius:18,cursor:"pointer",
                background:sel===id?"linear-gradient(135deg,#4ac890,#1a7a4a)":"rgba(210,245,228,0.7)",
                border:sel===id?"2px solid #1a7a4a":"2px solid rgba(120,200,160,0.5)",
                color:sel===id?"#fff":"#1a7a4a",fontFamily:"'Nunito',sans-serif",fontWeight:900,
                transition:"all 0.2s",WebkitTapHighlightColor:"transparent",touchAction:"manipulation"}}>
                <div style={{fontSize:36,marginBottom:6}}>{u.icon}</div>
                <div style={{fontSize:17}}>{u.name}</div>
                <div style={{fontSize:11,opacity:0.8,marginTop:3}}>{u.role==="trainer"?"トレーナー":"メンバー"}</div>
              </button>
            ))}
          </div>
        </div>
        {sel&&(
          <div style={{marginBottom:16}}>
            <input type="password" value={pw} placeholder="パスワードを入力"
              onChange={e=>{setPw(e.target.value);setErr("");}}
              onKeyDown={e=>e.key==="Enter"&&tryLogin()}
              style={{width:"100%",padding:"15px 16px",borderRadius:14,border:"2px solid #a0d8b8",
                fontSize:16,fontFamily:"'Noto Sans JP',sans-serif",background:"#f0faf5",color:"#1a4a3a",outline:"none"}}
              autoFocus/>
          </div>
        )}
        {err&&<div style={{fontSize:13,color:"#cc3333",textAlign:"center",marginBottom:12,fontFamily:"'Noto Sans JP',sans-serif"}}>⚠️ {err}</div>}
        <button onClick={tryLogin} disabled={!sel||!pw} style={{
          width:"100%",padding:"16px",borderRadius:16,border:"none",
          background:sel&&pw?"linear-gradient(135deg,#4ac890,#1a7a4a)":"#c0e0d0",
          color:sel&&pw?"#fff":"#7ab89a",fontSize:17,fontWeight:900,
          fontFamily:"'Nunito',sans-serif",cursor:sel&&pw?"pointer":"default",
          WebkitTapHighlightColor:"transparent",touchAction:"manipulation"}}>
          ログイン 💪
        </button>
      </div>
    </div>
  );
}

// ─── トレーニングタブ ──────────────────────────────────────
function TrainingTab({currentUser}) {
  const [training,setTraining]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState(null);
  const [fp,setFp]=useState("すべて");
  const [ft,setFt]=useState("すべて");
  const [showAdd,setShowAdd]=useState(false);
  const [addForm,setAddForm]=useState({exercise:"",bodyPart:"胸",type:"マシーン",sets:[{weight:"",reps:""}],notes:"",emoji:"🤜"});
  const emojis=["🤜","💪","🦵","🏅","🔄","⚡","🤸","🏃","🧘","🏊","🚴","🎯"];

  const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),3000);};

  const load=useCallback(async()=>{
    setLoading(true);
    try {
      const pages=await notionQuery(DB.training,[{property:"日付",direction:"descending"}]);
      setTraining(pages.map(parseTraining));
    } catch(e){console.error(e);}
    setLoading(false);
  },[]);

  useEffect(()=>{load();},[load]);

  const handleAdd=async()=>{
    if(!addForm.exercise.trim())return;
    setSaving(true);
    try {
      const sender=currentUser.role==="trainer"?"Tatsuro":"Ayumi";
      await notionCreate(DB.training,{
        "種目名":{title:[{text:{content:addForm.exercise}}]},
        "部位":{select:{name:addForm.bodyPart}},
        "タイプ":{select:{name:addForm.type}},
        "セット数":{number:addForm.sets.length},
        "メモ":{rich_text:addForm.notes?[{text:{content:addForm.notes}}]:[]},
        "日付":{date:{start:new Date().toISOString().slice(0,10)}},
        "追加者":{select:{name:sender}},
        "完了":{checkbox:false},
      });
      setAddForm({exercise:"",bodyPart:"胸",type:"マシーン",sets:[{weight:"",reps:""}],notes:"",emoji:"🤜"});
      setShowAdd(false);
      showToast("✅ Notionに保存しました！");
      await load();
    } catch(e){showToast("⚠️ 保存に失敗しました",false);}
    setSaving(false);
  };

  const filtered=training.filter(r=>(fp==="すべて"||r.bodyPart===fp)&&(ft==="すべて"||r.type===ft));
  const grouped=filtered.reduce((acc,r)=>{if(!acc[r.date])acc[r.date]=[];acc[r.date].push(r);return acc;},{});

  return (
    <div style={{padding:"16px 16px 100px",position:"relative",zIndex:1}}>
      {toast&&<Toast msg={toast.msg} ok={toast.ok}/>}

      <div style={{overflowX:"auto",marginBottom:10,WebkitOverflowScrolling:"touch"}}>
        <div style={{display:"flex",gap:8,paddingBottom:4,width:"max-content"}}>
          {BODY_PARTS.map(p=>(
            <button key={p} onClick={()=>setFp(p)} style={{
              padding:"9px 16px",borderRadius:22,minHeight:44,
              background:fp===p?"linear-gradient(135deg,#4ac890,#1a7a4a)":"rgba(255,255,255,0.78)",
              color:fp===p?"#fff":"#3a8a5a",fontSize:13,cursor:"pointer",
              fontFamily:"'Noto Sans JP',sans-serif",whiteSpace:"nowrap",
              border:fp===p?"none":"1.5px solid rgba(130,205,165,0.8)",
              fontWeight:fp===p?700:400,touchAction:"manipulation"}}>
              {BP_ICONS[p]} {p}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {TYPES.map(t=>(
          <button key={t} onClick={()=>setFt(t)} style={{
            flex:1,padding:"10px 4px",borderRadius:12,minHeight:44,
            background:ft===t?"linear-gradient(135deg,#4ac890,#1a7a4a)":"rgba(255,255,255,0.78)",
            color:ft===t?"#fff":"#3a8a5a",fontSize:12,cursor:"pointer",
            fontFamily:"'Noto Sans JP',sans-serif",
            border:ft===t?"none":"1.5px solid rgba(130,205,165,0.8)",
            fontWeight:ft===t?700:400,touchAction:"manipulation"}}>{t}</button>
        ))}
      </div>
      <button onClick={load} style={{
        width:"100%",padding:"11px",borderRadius:14,marginBottom:14,
        background:"rgba(255,255,255,0.8)",border:"1.5px solid #a0d8b8",
        color:"#1a7a4a",fontSize:13,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",
        touchAction:"manipulation"}}>🔄 最新データを取得</button>

      {loading?<LoadingSpinner msg="トレーニング記録を読み込み中..."/>:(
        <>
          <div style={{fontSize:12,fontWeight:800,color:"#2a8a5a",marginBottom:14,fontFamily:"'Nunito',sans-serif"}}>{filtered.length} RECORDS 💪</div>
          {Object.entries(grouped).map(([date,recs])=>(
            <div key={date} style={{marginBottom:22}}>
              <div style={{fontSize:12,fontWeight:800,color:"#1a7a4a",marginBottom:10,
                fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:8}}>
                <span>🗓 {date.replace(/-/g,".")}</span>
                <div style={{flex:1,height:2,background:"linear-gradient(90deg,#7acca0,transparent)",borderRadius:2}}/>
                <span>{recs.length}種目</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {recs.map(r=>{
                  const tc=TYPE_COL[r.type]||{};
                  return (
                    <div key={r.id} style={{
                      background:"rgba(255,255,255,0.88)",borderRadius:20,
                      border:"2px solid rgba(150,215,185,0.7)",padding:"16px",
                      boxShadow:"0 3px 18px rgba(30,150,80,0.10)"}}>
                      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                        <div style={{width:48,height:48,borderRadius:14,flexShrink:0,
                          background:"linear-gradient(135deg,#c0f0d8,#a0e8c0)",
                          display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{r.emoji}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:16,fontWeight:800,color:"#1a4a3a",fontFamily:"'Nunito',sans-serif",
                            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.exercise}</div>
                          <div style={{fontSize:12,color:"#5a9a7a",fontFamily:"'Noto Sans JP',sans-serif",marginTop:2}}>
                            {r.date.replace(/-/g,"/")} · {r.sets.length}セット
                            {r.addedBy==="Tatsuro"&&<span style={{marginLeft:6,color:"#1a5a8a"}}>🏋️ Taturo</span>}
                          </div>
                        </div>
                        <div style={{display:"flex",gap:5,flexShrink:0,flexDirection:"column",alignItems:"flex-end"}}>
                          <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:800,
                            background:tc.bg,color:tc.text,border:`1px solid ${tc.border}`,fontFamily:"'Nunito',sans-serif"}}>{r.type}</span>
                          <span style={{padding:"3px 10px",borderRadius:20,fontSize:11,
                            background:"#e8f8f0",color:"#1a7a4a",border:"1px solid #a0d8b8",
                            fontFamily:"'Noto Sans JP',sans-serif"}}>{r.bodyPart}</span>
                        </div>
                      </div>
                      {r.notes&&<div style={{fontSize:13,color:"#3a7a5a",padding:"10px 14px",
                        background:"#f0faf5",borderRadius:12,borderLeft:"4px solid #4ac890",
                        fontFamily:"'Noto Sans JP',sans-serif",lineHeight:1.6}}>{r.notes}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          {filtered.length===0&&(
            <div style={{textAlign:"center",padding:"60px 0",color:"#4aaa7a"}}>
              <div style={{fontSize:48,marginBottom:14}}>🏋️</div>
              <div style={{fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:16}}>記録が見つかりません</div>
            </div>
          )}
        </>
      )}

      {!showAdd&&(
        <button onClick={()=>setShowAdd(true)} style={{
          position:"fixed",bottom:90,right:20,width:56,height:56,borderRadius:"50%",
          background:"linear-gradient(135deg,#4ac890,#1a7a4a)",border:"none",
          color:"#fff",fontSize:28,cursor:"pointer",zIndex:200,
          display:"flex",alignItems:"center",justifyContent:"center",
          boxShadow:"0 4px 20px rgba(30,140,80,0.45)",touchAction:"manipulation"}}>＋</button>
      )}

      {showAdd&&(
        <div style={{position:"fixed",inset:0,background:"rgba(20,100,50,0.25)",
          display:"flex",alignItems:"flex-end",zIndex:1000,backdropFilter:"blur(6px)"}}
          onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
          <div style={{width:"100%",maxWidth:480,margin:"0 auto",
            background:"linear-gradient(180deg,#f0faf5,#e8f8f0)",
            borderRadius:"24px 24px 0 0",padding:"20px",
            paddingBottom:"max(40px,env(safe-area-inset-bottom))",
            border:"2px solid #a0d8b8",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:17,fontWeight:900,color:"#1a7a4a",fontFamily:"'Nunito',sans-serif"}}>💪 記録を追加</div>
              <button onClick={()=>setShowAdd(false)} style={{background:"#c0f0d8",border:"none",
                borderRadius:"50%",width:36,height:36,cursor:"pointer",fontSize:16,color:"#1a6a3a"}}>✕</button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
              {emojis.map(e=>(
                <button key={e} onClick={()=>setAddForm(f=>({...f,emoji:e}))} style={{
                  width:44,height:44,borderRadius:12,fontSize:22,cursor:"pointer",
                  background:addForm.emoji===e?"#c0f0d8":"#e8f8f0",
                  border:addForm.emoji===e?"2px solid #1a7a4a":"1.5px solid #a0d8b8"}}>
                  {e}

function DataTab() {
  const [body,setBody]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({weight:"",fat:"",muscle:"",bmi:"",notes:""});

  const showToast=(msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),3000);};
  const load=useCallback(async()=>{
    setLoading(true);
    try {
      const pages=await notionQuery(DB.body,[{property:"日付",direction:"descending"}]);
      setBody(pages.map(parseBody));
    } catch(e){console.error(e);}
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const handleSave=async()=>{
    if(!form.weight)return;
    setSaving(true);
    const today=new Date().toISOString().slice(0,10);
    try {
      await notionCreate(DB.body,{
        "記録日":{title:[{text:{content:today}}]},
        "体重(kg)":{number:Number(form.weight)},
        "体脂肪率(%)":{number:Number(form.fat)||0},
        "筋肉量(kg)":{number:Number(form.muscle)||0},
        "BMI":{number:Number(form.bmi)||0},
        "メモ":{rich_text:form.notes?[{text:{content:form.notes}}]:[]},
        "日付":{date:{start:today}},
      });
      setForm({weight:"",fat:"",muscle:"",bmi:"",notes:""});
      setShowForm(false);
      showToast("✅ Notionに保存しました！");
      await load();
    } catch(e){showToast("⚠️ 保存に失敗しました",false);}
    setSaving(false);
  };

  const latest=body[0],prev=body[1];
  const diff=k=>latest&&prev?(Number(latest[k])-Number(prev[k])).toFixed(1):0;
  const arrowC=(k,inv=false)=>{const d=diff(k);if(d==0)return"#888";const up=d>0;return(up&&!inv)||(!up&&inv)?"#cc4444":"#1a8a5a";};
  const arrowS=(k,inv=false)=>{const d=diff(k);if(d==0)return"→";const up=d>0;return(up&&!inv)||(!up&&inv)?"▲":"▼";};

  return (
    <div style={{padding:"16px 16px 100px",position:"relative",zIndex:1}}>
      {toast&&<Toast msg={toast.msg} ok={toast.ok}/>}
      {loading?<LoadingSpinner msg="ボディデータを読み込み中..."/>:(
        <>
          {latest&&(
            <div style={{background:"linear-gradient(135deg,rgba(195,238,215,0.97),rgba(170,225,200,0.97))",
              borderRadius:20,border:"2px solid #7acca0",padding:"18px 16px",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                <span style={{fontSize:24}}>📊</span>
                <div>
                  <div style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:16,color:"#1a5a3a"}}>最新データ</div>
                  <div style={{fontSize:12,color:"#3a8a5a",fontFamily:"'Noto Sans JP',sans-serif"}}>{latest.date.replace(/-/g,"/")} 測定</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[{l:"体重",k:"weight",u:"kg",inv:true},{l:"体脂肪率",k:"fat",u:"%",inv:true},
                  {l:"筋肉量",k:"muscle",u:"kg",inv:false},{l:"BMI",k:"bmi",u:"",inv:true}].map(m=>(
                  <div key={m.k} style={{background:"rgba(255,255,255,0.86)",borderRadius:14,padding:"14px 10px",textAlign:"center"}}>
                    <div style={{fontSize:11,color:"#5a9a7a",fontFamily:"'Noto Sans JP',sans-serif",marginBottom:4}}>{m.l}</div>
                    <div style={{fontSize:22,fontWeight:900,color:"#1a5a3a",fontFamily:"'Nunito',sans-serif"}}>{latest[m.k]}{m.u}</div>
                    <div style={{fontSize:11,color:arrowC(m.k,m.inv),fontFamily:"'Nunito',sans-serif",fontWeight:700,marginTop:3}}>
                      {arrowS(m.k,m.inv)} {Math.abs(diff(m.k))}{m.u}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
          <div style={{fontWeight:900,fontSize:13,color:"#1a7a4a",marginBottom:10,fontFamily:"'Nunito',sans-serif"}}>📈 測定履歴</div>
          <div style={{background:"rgba(255,255,255,0.88)",borderRadius:16,border:"2px solid rgba(150,215,185,0.7)",overflow:"hidden",marginBottom:16}}>
            <div style={{display:"grid",gridTemplateColumns:"1.2fr 1fr 1fr 1fr",
              padding:"10px 12px",background:"linear-gradient(135deg,#d8f0e4,#c0e8d0)",
              fontSize:11,fontWeight:800,color:"#1a6a4a",fontFamily:"'Nunito',sans-serif"}}>
              {["日付","体重","体脂肪%","筋肉量"].map(h=><div key={h} style={{textAlign:"center"}}>{h}</div>)}
            </div>
            {body.map((r,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1.2fr 1fr 1fr 1fr",
                padding:"11px 12px",fontSize:13,color:"#1a4a3a",
                background:i%2===0?"rgba(235,248,240,0.5)":"transparent",
                borderTop:"1px solid rgba(150,205,175,0.3)",fontFamily:"'Noto Sans JP',sans-serif"}}>
                <div style={{textAlign:"center",fontSize:11}}>{r.date.slice(5).replace("-","/")}</div>
                <div style={{textAlign:"center",fontWeight:700}}>{r.weight}</div>
                <div style={{textAlign:"center"}}>{r.fat}%</div>
                <div style={{textAlign:"center"}}>{r.muscle}</div>
              </div>
            ))}
            {body.length===0&&<div style={{textAlign:"center",padding:"30px",color:"#8ab8a0",fontFamily:"'Noto Sans JP',sans-serif"}}>データがありません</div>}
          </div>
        </>
      )}
      <button onClick={()=>setShowForm(s=>!s)} style={{
        width:"100%",padding:"14px",borderRadius:16,marginBottom:showForm?16:0,minHeight:52,
        background:showForm?"rgba(200,240,220,0.6)":"linear-gradient(135deg,#4ac890,#1a7a4a)",
        border:showForm?"2px dashed #4ac890":"none",
        color:showForm?"#1a7a4a":"#fff",fontSize:16,fontWeight:900,
        cursor:"pointer",fontFamily:"'Nunito',sans-serif",touchAction:"manipulation"}}>
        {showForm?"▲ 閉じる":"＋ 測定結果を入力"}
      </button>
      {showForm&&(
        <div style={{background:"rgba(255,255,255,0.93)",borderRadius:20,border:"2px solid #a0d8b8",padding:"16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            {[{k:"weight",ph:"体重 (kg)"},{k:"fat",ph:"体脂肪率 (%)"},{k:"muscle",ph:"筋肉量 (kg)"},{k:"bmi",ph:"BMI"}].map(f=>(
              <input key={f.k} type="number" placeholder={f.ph} value={form[f.k]}
                onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))}
                style={{padding:"13px",borderRadius:12,border:"1.5px solid #a0d8b8",
                  background:"#f0faf5",color:"#1a4a3a",fontSize:16,outline:"none"}}/>
            ))}
          </div>
          <textarea placeholder="メモ（体調など）" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
            style={{width:"100%",padding:"12px",borderRadius:12,marginBottom:12,
              border:"1.5px solid #a0d8b8",background:"#f0faf5",color:"#1a4a3a",
              fontSize:16,fontFamily:"'Noto Sans JP',sans-serif",minHeight:60,resize:"vertical"}}/>
          <button onClick={handleSave} disabled={saving} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",
            background:saving?"#c0e0d0":"linear-gradient(135deg,#4ac890,#1a7a4a)",color:"#fff",fontSize:16,
            fontWeight:900,cursor:saving?"default":"pointer",fontFamily:"'Nunito',sans-serif"}}>
            {saving?"保存中...":"Notionに保存 📊"}
          </button>
        </div>
      )}
    </div>
  );
}

      <div style={{background:"rgba(255,255,255,0.93)",borderRadius:20,border:"2px solid #a0d8b8",padding:"16px",marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:800,color:"#1a4a3a",fontFamily:"'Nunito',sans-serif",marginBottom:10}}>
          {isTrainer?"🏋️ Ayumiへメッセージ":"💬 Taturoへメッセージ"}
        </div>
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          {CATS.map(c=>(
            <button key={c} onClick={()=>setForm(f=>({...f,category:c}))} style={{
              padding:"6px 12px",borderRadius:20,cursor:"pointer",fontSize:12,
              background:form.category===c?"linear-gradient(135deg,#4ac890,#1a7a4a)":"#e8f8f0",
              color:form.category===c?"#fff":"#1a7a4a",border:"none",
              fontFamily:"'Noto Sans JP',sans-serif"}}>
              {c}
            </button>
          ))}
        </div>
        <textarea value={form.content} onChange={e=>setForm(f=>({...f,content:e.target.value}))}
          placeholder="メッセージを入力..."
          style={{width:"100%",padding:"13px",borderRadius:12,marginBottom:10,
            border:"1.5px solid #a0d8b8",background:"#f0faf5",color:"#1a4a3a",
            fontSize:16,fontFamily:"'Noto Sans JP',sans-serif",minHeight:80,resize:"vertical"}}/>
        <button onClick={handleSend} disabled={saving||!form.content.trim()} style={{
          width:"100%",padding:"14px",borderRadius:14,border:"none",
          background:saving||!form.content.trim()?"#c0e0d0":"linear-gradient(135deg,#4ac890,#1a7a4a)",
          color:"#fff",fontSize:15,fontWeight:900,cursor:"pointer",
          fontFamily:"'Nunito',sans-serif"}}>
          {saving?"送信中...":"送信 ✉️"}
        </button>
      </div>
      {loading?<LoadingSpinner msg="メッセージを読み込み中..."/>:(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {msgs.map(m=>{
            const fromTrainer=m.sender?.includes("Tatsuro →");
            return (
              <div key={m.id} style={{
                background:fromTrainer?"linear-gradient(135deg,#d8f0f8,#c8e8f4)":"rgba(210,245,228,0.95)",
                border:`1.5px solid ${fromTrainer?"#7abccc":"#a0d8b8"}`,
                borderRadius:16,padding:"14px",
                alignSelf:fromTrainer?"flex-start":"flex-end",maxWidth:"90%"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:12,fontWeight:800,
                    color:fromTrainer?"#1a4a6a":"#1a6a4a",fontFamily:"'Nunito',sans-serif"}}>
                    {fromTrainer?"🏋️ Taturo":"🌿 Ayumi"}
                  </span>
                  <span style={{fontSize:11,color:"#8ab8a0"}}>{m.date.replace(/-/g,"/")}</span>
                  <span style={{padding:"2px 8px",borderRadius:20,fontSize:10,
                    background:"rgba(255,255,255,0.6)",color:"#5a9a7a"}}>{m.category}</span>
                  {m.replied&&<span style={{fontSize:11,color:"#1a8a5a"}}>✅</span>}
                </div>
                {m.title&&<div style={{fontSize:13,fontWeight:700,color:"#1a4a3a",marginBottom:4,fontFamily:"'Nunito',sans-serif"}}>{m.title}</div>}
                <div style={{fontSize:14,color:"#2a4a3a",fontFamily:"'Noto Sans JP',sans-serif",lineHeight:1.6}}>{m.content}</div>
              </div>
            );
          })}
          {msgs.length===0&&<div style={{textAlign:"center",padding:"40px",color:"#8ab8a0",fontFamily:"'Noto Sans JP',sans-serif"}}>メッセージがありません</div>}
        </div>
      )}
    </div>
  );
}

// ─── メインアプリ ──────────────────────────────────────────
function App() {
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState(0);
  if(!user)return <LoginScreen onLogin={setUser}/>;
  return (
    <div style={{minHeight:"100vh",
      background:"linear-gradient(145deg,#d4f4e4 0%,#c0ecd8 30%,#b0e4cc 60%,#ccf0e0 100%)",
      fontFamily:"'Noto Sans JP',sans-serif",maxWidth:480,margin:"0 auto",position:"relative"}}>
      <BgDeco/>
      <div style={{
        padding:"12px 16px 10px",paddingTop:"max(12px,env(safe-area-inset-top))",
        position:"sticky",top:0,zIndex:100,
        background:"rgba(190,236,212,0.88)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",
        borderBottom:"1.5px solid rgba(110,195,150,0.5)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:22}}>🏋️</span>
              <span style={{fontSize:20,fontWeight:900,color:"#1a6a3a",fontFamily:"'Nunito',sans-serif"}}>MY FIT LOG</span>
              <span style={{fontSize:10,background:"#4ac890",color:"#fff",padding:"2px 8px",borderRadius:20,fontFamily:"'Nunito',sans-serif",fontWeight:800}}>Notion</span>
            </div>
            <div style={{fontSize:12,color:"#3a8a5a",fontFamily:"'Noto Sans JP',sans-serif",marginTop:2}}>
              {user.icon} {user.name}さん、お疲れ様です！
            </div>
          </div>
          <button onClick={()=>setUser(null)} style={{
            padding:"8px 14px",borderRadius:12,minHeight:44,
            background:"rgba(255,255,255,0.75)",border:"1.5px solid #7acca0",color:"#1a6a3a",
            fontSize:13,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontWeight:600}}>
            ログアウト
          </button>
        </div>
        <div style={{display:"flex",gap:6}}>
          {TABS.map((t,i)=>(
            <button key={t} onClick={()=>setTab(i)} style={{
              flex:1,padding:"8px 4px",borderRadius:12,border:"none",minHeight:48,
              background:tab===i?"linear-gradient(135deg,#4ac890,#1a7a4a)":"rgba(255,255,255,0.65)",
              color:tab===i?"#fff":"#3a8a5a",fontSize:11,fontWeight:tab===i?900:500,cursor:"pointer",
              fontFamily:"'Nunito',sans-serif",transition:"all 0.2s",
              boxShadow:tab===i?"0 3px 12px rgba(30,140,80,0.32)":"none",touchAction:"manipulation"}}>
              <div style={{fontSize:16,marginBottom:2}}>{TAB_ICONS[i]}</div>
              <div>{t}</div>
            </button>
          ))}
        </div>
      </div>
      {tab===0&&<TrainingTab currentUser={user}/>}
      {tab===1&&<HealthTab currentUser={user}/>}
      {tab===2&&<DataTab/>}
      {tab===3&&<MessageTab currentUser={user}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
